      description:
        value: >-
          <p>When a hostile Creature enters a 20-foot-radius around the Echo,
          and is not behind Full Cover from the Echo , they must make a Strength
          Saving Throw against your Spell Save DC. On a failed Save, they take
          6d6 Damage, with the Damage Type being one of the Damage Types present
          on the original Art (your choice), are pulled 15 feet towards the
          Echo, and have their Movement Speed reduced by half (rounding down).
          On a successful Save, they take half as much Damage, and suffer no
          other effects. </p><p>A Creature only needs to make this Save once per
          Turn.</p>
