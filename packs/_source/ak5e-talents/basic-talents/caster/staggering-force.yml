  description:
    value: >-
      <p>When you hit a Creature with a Spell Attack, or a Creature fails a
      Saving Throw against your Art during your Turn, you reduce that Creature’s
      Speed by 10 ft. until the end of their next Turn. A Creature can only have
      its Speed reduced in this way once per Round.</p><p><strong>Module Effect:
      </strong>It is no longer required for it to be your Turn for this Talent
      to slow a Creature's Speed.</p><p><strong>Barely Automated: </strong>Use
      the "Apply Slow" Activity to apply the speed reduction effect to valid
      Creatures. Don't forget you can use + and - when targeting to increase the
      number of targets.</p>
