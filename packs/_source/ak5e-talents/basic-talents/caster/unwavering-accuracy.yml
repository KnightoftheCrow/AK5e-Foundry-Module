  description:
    value: >-
      <p>You no longer have Disadvantage when making Ranged Spell Attacks while
      a hostile Creature is within 5 feet of you. Additionally, when you cast an
      Art with a Range of 10 feet or more, that Range is increased by 30
      feet.</p><p><strong>Module Effect: </strong>When you make a Spell Attack
      Roll, you may ignore the effects of Half and Three-Quarters
      Cover.</p><p><strong>Partially Automated: </strong>The removal of
      Disadvantage, and the ignoring of cover are automated. However, the Range
      increase is not automated.</p>
