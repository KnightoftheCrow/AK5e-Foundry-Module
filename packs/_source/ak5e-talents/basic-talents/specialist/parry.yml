  description:
    value: >-
      <p>When you are hit by an Attack while you have a Melee Weapon or Shield
      equipped, you may use your Reaction to increase your AC by 1d4 for the
      duration of that Attack, possibly causing that Attack to miss. If you also
      have the Defensive Fighting Style, your AC is increased by 2d4
      instead.</p><p><strong>Module:</strong> The d4 is improved one step to
      d6.</p><p><strong>Not automated.</strong></p>
