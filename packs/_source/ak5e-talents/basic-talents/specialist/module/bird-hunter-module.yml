  description:
    value: >-
      <p><strong>Module:</strong> If a Creature you can see moves using a Flying
      Speed within the Normal Range of a weapon you are wielding, you can expend
      your Reaction to make an Attack with that weapon against that Creature.
      You can use this Feature a number of times equal to your Proficiency
      Bonus, and regain all expended uses when you complete a Long Rest.</p>
