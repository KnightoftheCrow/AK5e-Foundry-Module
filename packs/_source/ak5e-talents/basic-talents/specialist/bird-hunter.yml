  description:
    value: >-
      <p>Your Ranged Attacks against Creatures not touching the ground deal
      additional Damage equal to your Proficiency
      Modifier.</p><p><strong>Module:</strong> If a Creature you can see moves
      using a Flying Speed within the Normal Range of a weapon you are wielding,
      you can expend your Reaction to make an Attack with that weapon against
      that Creature. You can use this Feature a number of times equal to your
      Proficiency Bonus, and regain all expended uses when you complete a Long
      Rest.</p><p><strong>Partially Automated:</strong> Can't take in account
      creature that not touching the ground. So use this feat to apply effect
      before damage roll.</p>
