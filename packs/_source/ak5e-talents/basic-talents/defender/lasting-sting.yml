  description:
    value: >-
      <p>Creatures who you have dealt Poison Damage to during a Turn take 2d10
      Poison Damage at the end of the Turn.</p><p><strong>Module:</strong>
      Additionally, at the end of the Turn, they must pass a DC15 Constitution
      Saving Throw or suffer the Poisoned Condition until the end of their next
      Turn.</p><p><strong>Partially Automated:</strong> Applyed bonus poison
      damage then rolling Damage rather at end of the Turn.</p>
