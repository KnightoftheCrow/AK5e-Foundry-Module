  description:
    value: >-
      <p><strong>Module Effect: </strong>You gain a Bonus to Attack Rolls
      against Creatures with that Creature Type equal to your Proficiency
      Bonus.</p><p><strong>Automated: </strong>Use the Activity on this item to
      choose your Creature Type to gain a bonus against; you can only do this
      once. For the module, simply use the activity on the module and it will
      give you the corresponding effect (this will produce a spam of "XYZ effect
      does not exist"; this is harmless and intended.</p>
