  description:
    value: >-
      <p>When a Creature hits you with a Melee Attack, you can force them (no
      Action required) to pass a Constitution Saving Throw against your Martial
      DC or be Dazed until the end of their next Turn. Once you have used this
      Feature, you may not do so again until you have completed a Short
      Rest.</p><p><strong>Module:</strong> You can now use this Feature a number
      of times equal to your Proficiency Bonus, and regain all expended uses
      when you complete a Long Rest.</p><p><strong>Not automated.</strong></p>
