  description:
    value: >-
      <p>When you forcibly move a hostile Creature, that Creature must succeed
      on a Saving Throw against your Martial DC or their Speed is reduced by 10
      feet until the end of their next Turn. A Creature can only have their
      Speed reduced in this way once per Round.</p><p><strong>Module:</strong>
      The reduction to the affected Creature’s Speed is now equal to 10 feet, or
      half the distance they were moved, which ever is
      greater.</p><p><strong>Not Automated.</strong></p>
