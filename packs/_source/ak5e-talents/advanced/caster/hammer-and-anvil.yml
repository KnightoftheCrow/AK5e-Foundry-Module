  description:
    value: >-
      <p>Once per Turn, when you hit a Creature within 5 feet of an allied
      Creature with a Ranged Attack, that Attack deals additional Damage equal
      to your Proficiency Bonus.</p><p><strong>Module:</strong> The range at
      which this Feature is effective is increased to 10
      feet.</p><p><strong>Partially Automated: </strong>You will be prompted for
      the additional Damage, but this does not check if there is an allied
      Creature close enough.</p>
