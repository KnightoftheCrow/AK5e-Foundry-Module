  advancement: []
  description:
    value: >-
      <p>Choose an Arts Damage Type; you gain Resistance to that Damage Type.
      When you finish a Long Rest, you may change the Damage Type you have
      chosen. Additionally, as a Reaction when you take Damage that you are
      Resistant or Immune to, choose a Creature you can see within 60 feet to
      direct Damage of the same Type towards them. That Creature must make a
      Dexterity Saving Throw against your Spell Save DC, taking 4d8 Damage on a
      failed Save, or half as much on a successful one.</p><p><strong>Module:
      </strong>You may choose two Damage Types for this Feature, as opposed to
      just one.</p><p><strong>Partially Automated: </strong>Use the Activity on
      this Feature to choose a Damage Resistance; however, when you reselect a
      new Damage Resistance, it will not delete the old one. You will have to do
      this manually. The Reaction will trigger whenever you are damaged, not
      just from corresponding damage types; make sure you pick the right damage
      type for the Saving Throw. </p>
    chat: ''
