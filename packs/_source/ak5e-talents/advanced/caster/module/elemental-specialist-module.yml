  description:
    value: >-
      <p><strong>Module:</strong> Whenever you roll to determine the Damage
      Dealt of your chosen Damage Type by one of your Arts, you may roll an
      additional die of that Damage.</p><p><strong>Automated: </strong>Use the
      Activity on this item to choose your Damage Type; you can only do this
      once. For the module, simply use the activity on the module and it will
      give you the corresponding effect (this will produce a spam of "XYZ effect
      does not exist"; this is harmless and intended.</p>
