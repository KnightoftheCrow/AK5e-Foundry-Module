  uses:
    spent: 0
    recovery: []
    max: ''
  advancement: []
  description:
    value: >-
      <p>You gain a Barrier that shatters whenever you take Damage from a
      Creature. When the Barrier shatters, it halves the Damage you take from
      the triggering instance of Damage. The Barrier reforms upon finishing a
      Long Rest, or you can expend 3 Arts Points as a Bonus Action to reform
      it.</p><p><strong>Module: </strong>When the Barrier shatters, it
      additionally grants you Resistance to the Damage Types present on that
      instance of Damage until the end of the Turn.</p><p><strong>Partially
      Automated: </strong>The Barrier works, but has troubles with any Damage
      Roll that has a flat bonus, as it is applied after the halving effect. You
      will have to account for this manually. When your barrier is broken while
      you have the module, you will be prompted for a reaction to choose a
      Resistance to gain; choose the one matching the Damage Type that broke
      your barrier.</p>
    chat: ''
  identifier: shelter
  source:
    revision: 1
    rules: '2014'
  crewed: false
  enchant: {}
