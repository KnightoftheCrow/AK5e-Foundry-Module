  description:
    value: >-
      <p><strong>Module: </strong>You may choose two Damage Types for this
      Feature, as opposed to just one.</p><p><strong>Partially Automated:
      </strong>Use the Activity on this Feature to choose a Damage Resistance;
      however, when you reselect a new Damage Resistance, it will not delete the
      old one. You will have to do this manually. The Reaction will trigger
      whenever you are damaged, not just from corresponding damage types; make
      sure you pick the right damage type for the Saving Throw.</p>
