  description:
    value: >-
      <p>When you deal Damage with an Art to a Creature who has any Damage
      Reduction against Physical Damage only, that Creature takes additional
      Damage from that Art equal to half of that Damage Reduction (rounding
      up).</p><p><strong>Module:</strong> Your Arts deal additional Damage to
      Creatures you have already Damaged with an Art this Turn equal to your
      Proficiency Bonus.</p><p><strong>Partially Automated: </strong>The base
      effect of this Talent is not possible to automate. You will be prompted
      for the additional damage for the module; check the box when it is
      appropriate. </p>
