  description:
    value: >-
      <p>When a Creature you can see within 30 feet of you would take Arts
      Damage, you can use this Feature as a Reaction. You can expend a number of
      Arts Points up to a value equal to your Proficiency Bonus; roll a d6 for
      each Arts Points expended in this way. The Arts Damage taken by that
      Creature is reduced by the total value rolled.</p><p><strong>Module:
      </strong>You roll 2d6 for each Art Point expended
      instead.</p><p><strong>Partially Automated: </strong>Cannot be
      automatically triggered when other Creatures are attacked. Consumes AP and
      rolls as it should. but does not reduce the damage taken.</p>
