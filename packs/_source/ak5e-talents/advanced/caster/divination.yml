  description:
    value: >-
      <p>Whenever you roll Initiative, roll 1d4. Depending on the result, you
      gain a bonus until the end of that combat: 1: +1 to Spell Save DC and
      Spell Attack Rolls. 2: +2 to Damage Rolls. 3: +15 Temporary Hit Points. 4:
      +10ft Speed.</p><p><strong>Module:</strong> The bonuses increase to +2,
      +4, +30, and +20ft respectively.</p><p><strong>Partially Automated:
      </strong>You will be prompted to roll 1d4 when an encounter begins. Then,
      you must use the matching activity to gain the benefit.</p>
    chat: ''
