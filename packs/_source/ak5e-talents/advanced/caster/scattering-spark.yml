  description:
    value: >-
      <p>Once per Turn, when you roll Damage for an Art, if at least one result
      on a dice is the maximum value that could be rolled on that dice, you
      create a explosion of energy. All Hostile Creatures within 15 feet of the
      location the Art was cast from must make a Dexterity Saving Throw against
      your Spell Save DC, taking 4d4 Damage on a failed Save or half as much on
      a successful one. The Damage Type is the same as one present on the
      original Art (your choice if there are
      multiple).</p><p><strong>Module:</strong> This Feature is no longer
      Restricted to once per Turn, and the Damage is increased to 6d4. However,
      this Feature is limited to once per Art.</p><p><strong>Partially
      Automated: </strong>The triggering condition for this Talent cannot be
      automated; you must manually use the Activity on this Talent (or the
      Module if you have it); make sure to choose the appropriate Damage Type.
      All else is automated.</p>
