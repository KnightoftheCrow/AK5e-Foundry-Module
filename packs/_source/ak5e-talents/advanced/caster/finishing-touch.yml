  description:
    value: >-
      <p>When you reduce a Creature to 0 Hit Points, you gain 1 Quickening. For
      each Quickening you have, you deal 1 additional Damage with all Attacks
      and Arts. Your maximum Quickening is five, and you lose all Quickening
      upon finishing a Long Rest.</p><p><strong>Module: </strong>When you reduce
      a Creature to 0 Hit Points, you gain 2 Quickening instead of
      1.</p><p><strong>Partially Automated: </strong>You must use the activity
      on this item (or the module if you have it) to gain Quickening each time
      you defeat a foe.</p>
