  description:
    value: >-
      <p>After you roll a Saving Throw, you may add a bonus equal to your
      Spellcasting Ability Modifier to the result of that Saving Throw; you may
      do this after you have seen the result of the roll, but before the DM
      tells you if the roll has passed or failed. You may use this Feature
      twice, and regain all expended uses when you complete a Long
      Rest.</p><p><strong>Module:</strong> You now regain use of this Feature
      after completing a Short or Long Rest.</p><p><strong>Automated:
      </strong>You will be prompted to use this Feature when appropriate. The
      Module will cause your uses to be reset on a Short Rest.</p>
