  description:
    value: >-
      <p>Choose an Arts Damage Type. You become Resistant to that Damage Type,
      and when you roll to determine Damage dealt by that Damage Type, you may
      reroll any result of 1, but must use the new
      result.</p><p><strong>Module:</strong> Whenever you roll to determine the
      Damage Dealt of your chosen Damage Type by one of your Arts, you may roll
      an additional die of that Damage.</p><p><strong>Automated: </strong>Use
      the Activity on this item to choose your Damage Type; you can only do this
      once.</p>
