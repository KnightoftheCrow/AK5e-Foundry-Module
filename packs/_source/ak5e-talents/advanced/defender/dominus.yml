  description:
    value: >-
      <p>Once per Short Rest, as a Bonus Action, you can force hostile Creatures
      within a 30-foot cone originating from you to make a Wisdom Saving Throw
      against your Martial DC. On a failed Save, they are Frightened of you
      until the end of their next Turn. On a successful Save, their Movement
      Speed is reduced by half (rounding up) until the end of their next
      Turn.</p><p><strong>Module:</strong> Your Attacks against Frightened
      Creatures deal an additional die of Damage.</p><p><strong>Not
      automated.</strong></p>
