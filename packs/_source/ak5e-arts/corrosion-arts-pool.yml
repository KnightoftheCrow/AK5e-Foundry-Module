  description:
    value: >-
      <p>One of the more brutalist applications of Arts, Corrosion Arts serve
      only to harm and destroy. There is little subtlety in their application,
      as Corrosion Casters bathe their targets in caustic gases and corrosive
      fluids.</p><p>(Arts that are <span
      style="text-decoration:underline">underlined</span> require the Player's
      Handbook. Arts that are in <em>italics</em> require Tasha's Cauldron of
      Everything. Arts that are <strong>Bold</strong> are not currently
      available in official content on Foundry) </p><table><thead><tr><td><p
      style="text-align:center"><strong>Arts Level</strong></p></td><td><p
      style="text-align:center"><strong>Arts</strong></p></td></tr></thead><tbody><tr><td><p>Cantrip</p></td><td><p>Acid
      Splash, Acid Surge, Produce
      Acid</p></td></tr><tr><td><p>1st</p></td><td><p>Acid Armour, Acid Douse,
      <em>Tasha's Caustic Brew</em>,
      Corrode</p></td></tr><tr><td><p>2nd</p></td><td><p>Abrasive Aura, Acid
      Arrow, Melting Mines,
      Rust</p></td></tr><tr><td><p>3rd</p></td><td><p>Boiling Burst, Melting
      Mist</p></td></tr><tr><td><p>4th</p></td><td><p>Acid Wave, <span
      style="text-decoration:underline">Vitrolic
      Sphere</span></p></td></tr><tr><td><p>5th</p></td><td><p>Acidify
      Blood</p></td></tr><tr><td><p>6th</p></td><td><p>Acid
      Rain</p></td></tr><tr><td><p>7th</p></td><td><p>Acerbic
      Flow</p></td></tr><tr><td><p>8th</p></td><td><p>-</p></td></tr><tr><td><p>9th</p></td><td>Sea
      of Acid</td></tr></tbody></table>
