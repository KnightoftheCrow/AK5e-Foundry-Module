  description:
    value: >-
      <p>Earth Arts resolve around manipulating the very dirt and stone beneath
      your feet, using the power of Originium to produce motion where there
      should be none. Earth Arts excel at controlling the battlefield, both
      literally and metaphorically, but are somewhat neutered when their feet
      are not on solid ground.</p><p>(Arts that are <span
      style="text-decoration:underline"><span
      style="text-decoration:underline">underlined</span></span> require the
      Player's Handbook. Arts that are in <em>italics</em> require Tasha's
      Cauldron of Everything. Arts that are <strong>Bold</strong> are not
      currently available in official content on Foundry; often Xanathar's Guide
      to Everything.)</p><table><thead><tr><td><p
      style="text-align:center"><strong>Arts Level</strong></p></td><td><p
      style="text-align:center"><strong>Arts</strong></p></td></tr></thead><tbody><tr><td><p>Cantrip</p></td><td><p>Mending,
      <strong>Mold Earth</strong>, Stone
      Shower</p></td></tr><tr><td><p>1st</p></td><td><p><strong>Earth
      Tremor</strong></p></td></tr><tr><td><p>2nd</p></td><td><p><strong>Earthbind,
      Maximillian's Earthen
      Grasp</strong></p></td></tr><tr><td><p>3rd</p></td><td><p><strong>Erupting
      Earth</strong>, Meld into Stone, <strong>Wall of
      Sand</strong></p></td></tr><tr><td><p>4th</p></td><td><p>Stone Shape,
      Stone Skin</p></td></tr><tr><td><p>5th</p></td><td><p>Passwall,
      <strong>Transmute Rock</strong>, Wall of
      Stone</p></td></tr><tr><td><p>6th</p></td><td><p><strong>Bones of the
      Earth</strong>, Flesh to Stone, <strong>Investiture of Stone</strong>,
      Move
      Earth</p></td></tr><tr><td><p>7th</p></td><td><p>-</p></td></tr><tr><td><p>8th</p></td><td><p><span
      style="text-decoration:underline"><span
      style="text-decoration:underline">Earthquake</span></span></p></td></tr><tr><td><p>9th</p></td><td>Mountainfall</td></tr></tbody></table>
