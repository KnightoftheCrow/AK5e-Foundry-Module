  description:
    value: >-
      <p>Those who wield Light Arts often appear to be angelic in their own
      right; in the sense that they are radiant, wrathful, and frightening. It
      is no surprise; Light Arts are notoriously difficult to master as a result
      of the difficulty imagining its effects. As a result, Light Casters are
      often progidies, smiting and confounding their foes.</p><p>(Arts that are
      <span style="text-decoration:underline"><span
      style="text-decoration:underline">underlined</span></span> require the
      Player's Handbook. Arts that are in <em>italics</em> require Tasha's
      Cauldron of Everything. Arts that are <strong>Bold</strong> are not
      currently available in official content on Foundry; often Xanathar's Guide
      to Everything.)</p><table><thead><tr><td><p
      style="text-align:center"><strong>Arts Level</strong></p></td><td><p
      style="text-align:center"><strong>Arts</strong></p></td></tr></thead><tbody><tr><td><p>Cantrip</p></td><td><p>Light,
      <span style="text-decoration:underline"><span
      style="text-decoration:underline">Starry Wisp</span></span>, <span
      style="text-decoration:underline"><span
      style="text-decoration:underline">Word of
      Radiance</span></span></p></td></tr><tr><td><p>1st</p></td><td><p>Faerie
      Fire, Guiding Bolt, Silent
      Image</p></td></tr><tr><td><p>2nd</p></td><td><p>Blur, Darkness,
      Invisibility, Mirror Image,
      Moonbeam</p></td></tr><tr><td><p>3rd</p></td><td><p>Daylight</p></td></tr><tr><td><p>4th</p></td><td><p><span
      style="text-decoration:underline"><span
      style="text-decoration:underline">Fount of Moonlight</span></span>,
      Greater Invisibility, <strong>Shadow of
      Moil</strong></p></td></tr><tr><td><p>5th</p></td><td><p><strong>Dawn</strong>,
      Seeming, <strong>Wall of
      Light</strong></p></td></tr><tr><td><p>6th</p></td><td><p>Sunbeam</p></td></tr><tr><td><p>7th</p></td><td><p><strong>Crown
      of
      Stars</strong></p></td></tr><tr><td><p>8th</p></td><td><p>Sunburst</p></td></tr><tr><td><p>9th</p></td><td>Megiddo</td></tr></tbody></table>
