  description:
    value: >-
      <p>Perhaps the most rare of the “standard” Arts, Psychic Arts interfere
      with the consciousness of the target by altering nervous impulses in their
      brain and body. In this way, the Caster can control, to a certain extent,
      what the target percieves, and how they feel. Less subtly, they can also
      directly cause them harm through this same method; altering brain
      chemistry can lead to sharp and severe physiological consequences. Because
      of these facts, and the subtly of their Arts, Psychic Casters are the
      subject of fear and suspicion; a fear that only intensifies the more aware
      you are of them.</p><p>(Arts that are <span
      style="text-decoration:underline"><span
      style="text-decoration:underline">underlined</span></span> require the
      Player's Handbook. Arts that are in <em>italics</em> require Tasha's
      Cauldron of Everything. Arts that are <strong>Bold</strong> are not
      currently available in official content on Foundry; often Xanathar's Guide
      to Everything.)</p><table><thead><tr><td><p
      style="text-align:center"><strong>Arts Level</strong></p></td><td><p
      style="text-align:center"><strong>Arts</strong></p></td></tr></thead><tbody><tr><td><p>Cantrip</p></td><td><p><span
      style="text-decoration:underline">Friends</span>, <span
      style="text-decoration:underline">Mind
      Sliver</span></p></td></tr><tr><td><p>1st</p></td><td><p>Charm Person,
      <span style="text-decoration:underline">Dissonant Whispers</span>,
      Heroism, Sleep</p></td></tr><tr><td><p>2nd</p></td><td><p>Calm Emotions,
      Detect Thoughts, <span style="text-decoration:underline">Mind
      Spike</span>, <span style="text-decoration:underline">Phantasmal
      Force</span></p></td></tr><tr><td><p>3rd</p></td><td><p><strong>Enemies
      Abound</strong>, Fear, <em>Intellect
      Fortress</em></p></td></tr><tr><td><p>4th</p></td><td><p>Dominate Beast,
      Phantasmal Killer, <strong>Rautholim's Psychic
      Lance</strong></p></td></tr><tr><td><p>5th</p></td><td><p>Dominate Person,
      <span style="text-decoration:underline">Synaptic
      Static</span></p></td></tr><tr><td><p>6th</p></td><td><p>Mass Suggestion,
      <strong>Mental
      Prison</strong></p></td></tr><tr><td><p>7th</p></td><td><p><strong>-</strong></p></td></tr><tr><td><p>8th</p></td><td><p>Dominate
      Monster</p></td></tr><tr><td><p>9th</p></td><td><strong>Psychic
      Scream</strong>, Weird</td></tr></tbody></table>
