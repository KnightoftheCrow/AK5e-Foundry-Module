  description:
    value: >-
      <p>While Flame Arts are an exercise in the manipulation of the thermal and
      chemical energy of an area, Frost Arts explore the temperature element to
      a new degree. Often considered cross-disciplinary with Fluid Arts, Frost
      Casters protect themselves and others; both directly, and by making the
      area a frozen hell for their enemies.</p><p>(Arts that are <span
      style="text-decoration:underline"><span
      style="text-decoration:underline">underlined</span></span> require the
      Player's Handbook. Arts that are in <em>italics</em> require Tasha's
      Cauldron of Everything. Arts that are <strong>Bold</strong> are not
      currently available in official content on Foundry; often Xanathar's Guide
      to Everything.)</p><table><thead><tr><td><p
      style="text-align:center"><strong>Arts Level</strong></p></td><td><p
      style="text-align:center"><strong>Arts</strong></p></td></tr></thead><tbody><tr><td><p>Cantrip</p></td><td><p><strong>Frostbite</strong>,
      Protect from Heat, Ray of
      Frost</p></td></tr><tr><td><p>1st</p></td><td><p><span
      style="text-decoration:underline"><span
      style="text-decoration:underline">Armour of Agathys</span></span>, Ice
      Barrier, <span style="text-decoration:underline"><span
      style="text-decoration:underline">Ice
      Knife</span></span></p></td></tr><tr><td><p>2nd</p></td><td><p>Ice Sheet,
      <strong>Rime's Binding Ice</strong>, Snap
      Freeze</p></td></tr><tr><td><p>3rd</p></td><td><p>Icicle Crash, Sleet
      Storm</p></td></tr><tr><td><p>4th</p></td><td><p>Ice Storm,
      Permafrost</p></td></tr><tr><td><p>5th</p></td><td><p>Cone of
      Cold</p></td></tr><tr><td><p>6th</p></td><td><p>Freezing Sphere,
      <strong>Investiture of Ice</strong>, Wall of
      Ice</p></td></tr><tr><td><p>7th</p></td><td><p>Avalanche</p></td></tr><tr><td><p>8th</p></td><td><p>Fimbulvetr</p></td></tr><tr><td><p>9th</p></td><td>Absolute
      Zero</td></tr></tbody></table>
