  description:
    value: >-
      <p>Spatial Arts, as the name would suggest, involve manipulating the
      physical properties of an object; specifically its position. Their method
      of doing so is not just simple telekinesis, though it is certainly
      involved, but also through manipulating the effect of gravity of an
      object. By decreasing the weight of an object, it makes it easier to throw
      or otherwise launch. By reversing gravitational force in an area, they can
      exclude objects and people both from passing through an area. As a result
      of these Arts, Spatial Casters are often found in supportive roles, but do
      not underestimate their capacity for destruction.</p><p>(Arts that are
      <span style="text-decoration:underline"><span
      style="text-decoration:underline">underlined</span></span> require the
      Player's Handbook. Arts that are in <em>italics</em> require Tasha's
      Cauldron of Everything. Arts that are <strong>Bold</strong> are not
      currently available in official content on Foundry; often Xanathar's Guide
      to Everything.)</p><table><thead><tr><td><p
      style="text-align:center"><strong>Arts Level</strong></p></td><td><p
      style="text-align:center"><strong>Arts</strong></p></td></tr></thead><tbody><tr><td><p>Cantrip</p></td><td><p>Burden,
      Mage
      Hand</p></td></tr><tr><td><p>1st</p></td><td><p><strong>Catapult</strong>,
      Launch, Shield,
      Thunderwave</p></td></tr><tr><td><p>2nd</p></td><td><p>Hold Person,
      Levitate,
      Shatter</p></td></tr><tr><td><p>3rd</p></td><td><p>Slow</p></td></tr><tr><td><p>4th</p></td><td><p>Repulsion
      Field, Otiluke's Resilient
      Sphere</p></td></tr><tr><td><p>5th</p></td><td><p>Arcane Hand, <span
      style="text-decoration:underline">Destructive Wave</span>, Hold Monster,
      Telekinesis</p></td></tr><tr><td><p>6th</p></td><td><p>Alter
      Gravity</p></td></tr><tr><td><p>7th</p></td><td><p>Reverse
      Gravity</p></td></tr><tr><td><p>8th</p></td><td><p>-</p></td></tr><tr><td><p>9th</p></td><td>Event
      Horizon</td></tr></tbody></table>
