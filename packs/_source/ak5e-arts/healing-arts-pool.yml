  description:
    value: >-
      <p>Healing Arts differ from typical Arts in that their method of
      application is not easily defined. The body is extremely complex, but
      underneath it all, it is ultimately just nutrients and minerals, both of
      which can be acted on by Arts. The ways in which Arts can be used to
      promote healing are thus great and varied; some vastly promote natural
      healing, some physically close wounds and knit bone back together, others
      alter the chemistry of the body, and so on. Many of the principles
      practised by practioners of other forms of Arts find a use in Healing Arts
      also; what they all have in common is that they all require an advanced
      understanding of the physiology of the target, lest you do more harm than
      good.</p><p>Arts marked with <strong>an asterisk</strong> can <strong>no
      longer heal diseases</strong>; that is the purview of traditional
      medicine.</p><p>(Arts that are <span
      style="text-decoration:underline"><span
      style="text-decoration:underline">underlined</span></span> require the
      Player's Handbook. Arts that are in <em>italics</em> require Tasha's
      Cauldron of Everything. Arts that are <strong>Bold</strong> are not
      currently available in official content on Foundry; often Xanathar's Guide
      to Everything.)</p><table><tbody><tr><td><p>Cantrip</p></td><td><p>Abjure,
      <strong>Toll the
      Dead</strong></p></td></tr><tr><td><p>1st</p></td><td><p><span
      style="text-decoration:underline"><span
      style="text-decoration:underline">Cure Wounds</span></span>, <span
      style="text-decoration:underline"><span
      style="text-decoration:underline">Healing
      Word</span></span></p></td></tr><tr><td><p>2nd</p></td><td><p><span
      style="text-decoration:underline"><span
      style="text-decoration:underline">Aid</span></span>, Bolster, <span
      style="text-decoration:underline"><span
      style="text-decoration:underline">Lesser Restoration</span></span>*, <span
      style="text-decoration:underline"><span
      style="text-decoration:underline">Prayer of Healing</span></span>, <span
      style="text-decoration:underline"><span
      style="text-decoration:underline">Protection from Poison</span></span>,
      <span style="text-decoration:underline"><span
      style="text-decoration:underline">Warding
      Bond</span></span></p></td></tr><tr><td><p>3rd</p></td><td><p><span
      style="text-decoration:underline"><span
      style="text-decoration:underline">Aura of Vitality</span></span>, <span
      style="text-decoration:underline"><span
      style="text-decoration:underline">Beacon of Hope</span></span>, <span
      style="text-decoration:underline"><span
      style="text-decoration:underline">Mass Healing
      Word</span></span></p></td></tr><tr><td><p>4th</p></td><td><p><span
      style="text-decoration:underline"><span
      style="text-decoration:underline">Death
      Ward</span></span></p></td></tr><tr><td><p><strong>5th</strong></p></td><td><p><span
      style="text-decoration:underline"><span
