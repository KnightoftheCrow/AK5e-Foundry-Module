  description:
    value: >-
      <p>Wind Arts and Spatial Arts are, erroneously, sometimes considered one
      and the same, but it easy to see why the mistake is made. Both involve the
      manipulation of gravity to some extent, but while Spatial Arts are more
      explicit with their effects, Wind Arts use their power to rapidly alter
      air pressure, causing great winds and gusts, or preventing them. With
      these winds at their back, a Wind Caster and their allies can move at
      blinding speed, or abjure entire crowds of people with battering, slicing
      winds.</p><p>(Arts that are <span style="text-decoration:underline"><span
      style="text-decoration:underline">underlined</span></span> require the
      Player's Handbook. Arts that are in <em>italics</em> require Tasha's
      Cauldron of Everything. Arts that are <strong>Bold</strong> are not
      currently available in official content on Foundry; often Xanathar's Guide
      to Everything.)</p><table><thead><tr><td><p
      style="text-align:center"><strong>Arts Level</strong></p></td><td><p
      style="text-align:center"><strong>Arts</strong></p></td></tr></thead><tbody><tr><td><p>Cantrip</p></td><td><p><strong>Gust</strong>,
      <span style="text-decoration:underline">Thunderclap</span>, Wind
      Slash</p></td></tr><tr><td><p>1st</p></td><td><p>Expeditious Retreat,
      Feather Fall, Longstrider</p></td></tr><tr><td><p>2nd</p></td><td><p>Air
      Barrage, <strong>Dust Devil</strong>, Gust of Wind, <strong>Warding
      Wind</strong></p></td></tr><tr><td><p>3rd</p></td><td><p>Fly, Stinking
      Cloud, Wind Wall</p></td></tr><tr><td><p>4th</p></td><td><p>Freedom of
      Movement, <strong>Storm
      Sphere</strong></p></td></tr><tr><td><p>5th</p></td><td><p>Cloudkill,
      <strong>Control
      Winds</strong></p></td></tr><tr><td><p>6th</p></td><td><p><strong>Investiture
      of Wind</strong>, Wind
      Walk</p></td></tr><tr><td><p>7th</p></td><td><p><strong>Whirlwind</strong></p></td></tr><tr><td><p>8th</p></td><td><p>Control
      Weather</p></td></tr><tr><td><p>9th</p></td><td>Avatar of
      Wind</td></tr></tbody></table>
