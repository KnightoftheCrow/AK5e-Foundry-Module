  description:
    value: >-
      <p>Next to Flame Arts, Electric Arts are some of the most visually
      fearsome, with great bolts of lightning blasting the life clean out of
      people, leaving their bodies as empty, smoking husks. It is a very primal
      power, and thus some accuse Electrical Casters of being
      primitive.</p><p>(Arts that are <span
      style="text-decoration:underline"><span
      style="text-decoration:underline">underlined</span></span> require the
      Player's Handbook. Arts that are in <em>italics</em> require Tasha's
      Cauldron of Everything. Arts that are <strong>Bold</strong> are not
      currently available in official content on Foundry; often Xanathar's Guide
      to Everything.)</p><table><thead><tr><td><p
      style="text-align:center"><strong>Arts Level</strong></p></td><td><p
      style="text-align:center"><strong>Arts</strong></p></td></tr></thead><tbody><tr><td><p>Cantrip</p></td><td><p>Ball
      Lightning, <em>Lightning Lure</em>, Shocking
      Grasp</p></td></tr><tr><td><p>1st</p></td><td><p>Leaping Current,
      Lightning Spear, <span
      style="text-decoration:underline">Witchbolt</span></p></td></tr><tr><td><p>2nd</p></td><td><p>Galvanic
      Gauntlet, Galvanise</p></td></tr><tr><td><p>3rd</p></td><td><p>Call
      Lightning, <span style="text-decoration:underline">Lightning Arrow</span>,
      Lightning Bolt, Shock and
      Awe</p></td></tr><tr><td><p>4th</p></td><td><p>Lightning Blade,
      <strong>Storm
      Sphere</strong></p></td></tr><tr><td><p>5th</p></td><td><p>Overload</p></td></tr><tr><td><p>6th</p></td><td><p>Chain
      Lightning, Investiture of
      Lightning</p></td></tr><tr><td><p>7th</p></td><td><p>Storm
      Sphere</p></td></tr><tr><td><p>8th</p></td><td><p>-</p></td></tr><tr><td><p>9th</p></td><td>Raijin's
      Rage</td></tr></tbody></table>
