  description:
    value: >-
      <p>So-called Crude Arts are common application of Originium Arts without
      any particular consideration for form. Crude Casters take the raw energy
      of Originium and wield it like a hammer. And when you have these powers,
      everything begins to look like a nail. That is not to say, however, that
      they are incapable of any subtlety; just mostly.</p><p>(Arts that are
      <span style="text-decoration:underline"><span
      style="text-decoration:underline">underlined</span></span> require the
      Player's Handbook. Arts that are in <em>italics</em> require Tasha's
      Cauldron of Everything. Arts that are <strong>Bold</strong> are not
      currently available in official content on
      Foundry)</p><table><thead><tr><td><p
      style="text-align:center"><strong>Arts Level</strong></p></td><td><p
      style="text-align:center"><strong>Arts</strong></p></td></tr></thead><tbody><tr><td><p>Cantrip</p></td><td><p>Eldritch
      Blast, Prestidigitation,
      Shillelagh</p></td></tr><tr><td><p>1st</p></td><td><p>Alarm, Mage Armour,
      Magic Missile, Shield</p></td></tr><tr><td><p>2nd</p></td><td><p>Arcane
      Lock, Knock, Magic
      Weapon</p></td></tr><tr><td><p>3rd</p></td><td><p>Arcane Eye, Missile
      Barrier, Protection from
      Energy</p></td></tr><tr><td><p>4th</p></td><td><p>Forcewave</p></td></tr><tr><td><p>5th</p></td><td><p><span
      style="text-decoration:underline">Circle of
      Power</span></p></td></tr><tr><td><p>6th</p></td><td><p>Arcane Lance,
      Disintegrate, <strong>Primordial
      Ward</strong></p></td></tr><tr><td><p>7th</p></td><td><p>Arts
      Artillery</p></td></tr><tr><td><p>8th</p></td><td><p>-</p></td></tr><tr><td><p>9th</p></td><td>Arcane
      Tempest</td></tr></tbody></table>
