  description:
    value: >-
      <p>An oft neglected field of Arts, Fluid Arts do exactly what their name
      implies, and manipulate fluids. Typically, this is water, but it need not
      be. Fluid Arts are less about raw destructive force, but utility; few can
      resist the raging torrent pushing them around, and fewer still are immune
      to drowning.</p><p>(Arts that are <span
      style="text-decoration:underline"><span
      style="text-decoration:underline">underlined</span></span> require the
      Player's Handbook. Arts that are in <em>italics</em> require Tasha's
      Cauldron of Everything. Arts that are <strong>Bold</strong> are not
      currently available in official content on Foundry; often Xanathar's Guide
      to Everything.)</p><table><thead><tr><td><p
      style="text-align:center"><strong>Arts Level</strong></p></td><td><p
      style="text-align:center"><strong>Arts</strong></p></td></tr></thead><tbody><tr><td><p>Cantrip</p></td><td><p>Aqua
      Blade, <strong>Shape Water,</strong> Water
      Bullet</p></td></tr><tr><td><p>1st</p></td><td><p>Create/Destroy Water,
      Fog Cloud, Grease, Purify
      Food/Drink</p></td></tr><tr><td><p>2nd</p></td><td><p>Misty Step, Water
      Pulse</p></td></tr><tr><td><p>3rd</p></td><td><p><strong>Tidal
      Wave</strong>, Water Breathing, Water Walk, <strong>Wall of
      Water</strong></p></td></tr><tr><td><p>4th</p></td><td><p>Control Water,
      <strong>Watery
      Sphere</strong></p></td></tr><tr><td><p>5th</p></td><td><p><strong>Maelstrom</strong></p></td></tr><tr><td><p>6th</p></td><td><p><strong>Investiture
      of
      Water</strong></p></td></tr><tr><td><p>7th</p></td><td><p>-</p></td></tr><tr><td><p>8th</p></td><td><p><strong>Abi-Dalzim's
      Horrid Wilting</strong>, <span
      style="text-decoration:underline">Tsunami</span></p></td></tr><tr><td><p>9th</p></td><td>Fill
      Lungs</td></tr></tbody></table>
