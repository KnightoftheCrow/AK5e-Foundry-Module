  description:
    value: >-
      <p>Flame Arts are an extremely popular and thus common school of study,
      and it is not hard to understand why. Every living being understands to
      some primal degree the danger fire represents. Flame Casters dwell in this
      inferno, empowering themselves and incinerating huge swathes of
      land.</p><p>(Arts that are <span style="text-decoration:underline"><span
      style="text-decoration:underline">underlined</span></span> require the
      Player's Handbook. Arts that are in <em>italics</em> require Tasha's
      Cauldron of Everything. Arts that are <strong>Bold</strong> are not
      currently available in official content on Foundry; often Xanathar's Guide
      to Everything.)</p><table><thead><tr><td><p
      style="text-align:center"><strong>Arts Level</strong></p></td><td><p
      style="text-align:center"><strong>Arts</strong></p></td></tr></thead><tbody><tr><td><p>Cantrip</p></td><td><p>Fire
      Bolt, Produce Flame, Protect from
      Cold</p></td></tr><tr><td><p>1st</p></td><td><p>Burning Hands, Hellish
      Rebuke</p></td></tr><tr><td><p>2nd</p></td><td><p><strong>Aganazzar's
      Scorcher</strong>, Flame Blade, <span
      style="text-decoration:underline">Flaming Sphere</span>, Scorching
      Ray</p></td></tr><tr><td><p>3rd</p></td><td><p><strong>Ashardalon's
      Stride</strong>, Fireball</p></td></tr><tr><td><p>4th</p></td><td><p>Fire
      Shield, Wall of Fire</p></td></tr><tr><td><p>5th</p></td><td><p>Flame
      Strike,
      <strong>Immolation</strong></p></td></tr><tr><td><p>6th</p></td><td><p><strong>Investiture
      of Flame</strong></p></td></tr><tr><td><p>7th</p></td><td><p>Delayed Blast
      Fireball, Firestorm</p></td></tr><tr><td><p>8th</p></td><td><p>Incendiary
      Cloud</p></td></tr><tr><td><p>9th</p></td><td>Pyroclasm</td></tr></tbody></table>
