  description:
    value: >-
      <p>To you, the emphasis in “High Value Target” is the word “Target.” You
      gain the following benefits:</p><p><strong>Lethal. </strong>Your Attacks
      against your Target have +1 Critical Range. If that Creature is also an
      Elite or Leader, your Critical Range is increased by a further
      +1.</p><p><strong>Target of Opportunity. </strong>As a Short Rest Action,
      you can nominate a Creature, either by name or by stating at least two
      distinguishing features of that Creature. If you do so, that Creature is
      considered to be your Target until you next complete a Short or Long Rest.
      Marking a Creature as your Target in this way does not prevent you from
      marking a different Creature as your
      Target.</p><p></p><p><strong>Partially Automated: </strong>When you
      encounter your target of Opportunity, use the Activity on this Feature to
      Apply your Target to them. All other aspects are automated.</p>
