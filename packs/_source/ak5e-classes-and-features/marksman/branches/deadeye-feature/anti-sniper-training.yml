  description:
    value: >-
      <p>Keep low, and keep your profile small. That’s how you survive when the
      bolts and bullets start flying.</p><p><strong>Head Down.</strong> After
      you enter Deadshot State, you gain the benefit of Half Cover until the
      beginning of your next Turn. If you would gain the benefit of Half Cover
      from a different source, you instead gain the benefit of Three-Quarters
      Cover while you are benefitting from that additional
      source.</p><p><strong>Small Profile.</strong> You gain Proficiency in the
      Stealth Skill. If you already have Proficiency in this Skill, you have
      Advantage on Checks using this Skill so long as you have the benefit of at
      least Three-Quarters Cover.</p><p><strong>Not Automated: </strong>Will
      grant Stealth Proficiency, but nothing else.</p>
