  description:
    value: >-
      <p>Whenever you deal Thunder Damage as a result of a Weapon with the
      Splash (X) Property, you can cause aSecondary Detonation (no Action
      required). Choose a point you can see that is within 15 feet of the centre
      ofthe original effect, and resolve that Attack or Trap againcentred on
      that location. However, the Damage of this Secondary Detonation is halved,
      and if a Creature succeeds on the Saving Throw, they take no Damage. These
      Secondary Detonations cannot generateadditional Secondary
      Detonations.</p><p>You may use this Feature a number of times equal to
      your Proficiency Bonus, and recover all expended usesupon finishing a Long
      Rest.</p><p><strong>Not Automated.</strong></p>
