  description:
    value: >-
      <p>The strength of a Chain Caster is in the name; your Arts flash from
      target to target in an instant, turning one target into several. Unlike
      some of your Caster brethren, however, you understand that Arts are not
      just a force for destruction. In more subtle applications, they can
      empower and uplift allies just as easily as they can smite foes.</p>
