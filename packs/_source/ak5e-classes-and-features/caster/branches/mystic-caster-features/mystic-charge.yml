  description:
    value: >-
      <p>You learn to store your arcane strength for a singular moment.</p><p>At
      the end of your Turn, if you have spent Arts Points this Turn, but have
      not expended any Mystic Charge this Turn, you gain 1 Mystic
      Charge.</p><p>Alternatively, you may conduct a minute long Ritual to
      generate Mystic Charge. You must remain stationary for the duration, and
      it is treated as if you were concentrating on a Spell. At the end of the
      Ritual, you may expend up to 3 Arts Points; you gain 1 Mystic Charge for
      each expended, up to your maximum Mystic Charge.</p><p>The maximum amount
      of Mystic Charge you can have simultaneously is 2. You lose all Mystic
      Charge upon finishing a Long Rest.</p><p>While you have any Mystic
      Charges, you can use your Action to expend all of your Mystic Charges.
      When you do so, you may then cast a Cantrip you know with a Casting Time
      of Action as part of this Action. Then, you may cast that Cantrip again
      for each Mystic Charge expended, also as part of this Action. Cantrips
      cast using this Feature cannot score a Critical
      Hit.</p><p><strong>Partially Automated: </strong>You need to trigger the
      Activity to gain Mystic Charge manually. From 6th Level, Power Surge will
      be automatically accounted for when you expend Mystic Charge.</p>
