  description:
    value: >-
      <p>Precision is never the goal of a Splash Caster. Their goal is to wield
      their power unrestrained and uncontrolled, lashing their foes with
      unshackled Arts. Or at least, that is how it appears; in reality, the Arts
      of a Splash Caster are tightly controlled and refined to inflict as much
      damage as possible.</p>
