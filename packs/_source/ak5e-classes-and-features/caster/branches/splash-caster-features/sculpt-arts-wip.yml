  description:
    value: >-
      <p>You can better control the area of your Arts; to shield Creatures of
      your choice from the worst fury of your Arts, or to expose them to it. You
      gain the following benefitsL</p><p><strong>Safe Zone.</strong> When you
      cast an Art that targets an area, you can choose a number of Creatures in
      that area equal to 1 plus the Level the Art was cast at. The chosen
      Creatures automatically succeed on their Saving Throws against the Art,
      and they take no Damage if they would normally take half Damage on a
      successful Save.</p><p><strong>Overwhelming Detonation.</strong> You can
      increase the area that your Arts affect. When you cast an Art that targets
      an Area, you can expend a number of additional Arts Points up to twice
      your Proficiency Bonus to increase the size of the affected area for each
      Arts Point expended. How an Art is affected depends on the area it
      affects:</p><ul><li><p><strong>Cone:</strong> The length of the Cone is
      increased by 10 feet for every additional Arts Point
      expended.</p></li><li><p><strong>Cube:</strong> The side length of the
      Cube is increased by 10 feet for every additional Arts Point
      expended.</p></li><li><p><strong>Line:</strong> The length of the line is
      increased by 20 feet for every additional Arts Point
      expended.</p></li><li><p><strong>Sphere:</strong> The radius of the Sphere
      is increased by 5 feet for every additional Arts Point
      expended.</p></li></ul>
