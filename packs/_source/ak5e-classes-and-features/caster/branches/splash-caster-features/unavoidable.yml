  description:
    value: >-
      <p>Your area-of-effect Arts are so potent that few can ever hope to avoid
      them. You gain the following
      benefits:</p><p><strong>All-Consuming.</strong> Once per Short Rest, when
      you cast an Art that targets an area, you can cause all Creatures affected
      to have Disadvantage on their Saving Throws against that Art this
      Turn.</p><p><strong>Maximum Burst.</strong> Creatures (except Creatures
      immune to that Art) cannot take less than half of the rolled Damage from
      your Arts that target an Area, even if they are Resistant or have an
      Ability that allows them to reduce the Damage (such as Evasion), or have
      Damage Reduction.</p><p><strong>Partially Automated: </strong>Use the
      Activity on this Feature before you cast the Art. Maximum Burst cannot be
      automated.</p>
