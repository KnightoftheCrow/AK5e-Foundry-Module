  description:
    value: >-
      <p>Your mastery of area-of-effect Arts is such that you can manifest them
      even from unfamiliar Arts Pools. You gain the following
      benefits:</p><p><strong>Additional Arts.</strong> You learn two Arts of
      your choice from any of the Standard Arts Pools. They do not have to be
      from the same Arts Pool, but they all must target an area. These Arts are
      always Prepared.</p><p><strong>Economics of Violence.</strong> Whenever
      you cast an Art of 5th Level or lower that targets an area, that Art costs
      one fewer Arts Point, to a minimum of 1. This reduction is applied after
      the reduction from your Growing Power Feature.</p><p><strong>Partially
      Automated: </strong>You will be prompted to learn two AoE Arts when you
      gain this Feature. The AP Cost reduction cannot be automated.</p>
