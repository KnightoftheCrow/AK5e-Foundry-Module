  description:
    value: >-
      <p>Your area-of-effect Arts are more difficult to evade.</p><p>You gain a
      +2 Bonus to your Spell Save DC when casting Arts that target an
      area.</p><blockquote><p><strong>Arts that Target an
      Area</strong></p><p>Many Features in this Branch refer to Arts that target
      an Area. For these purposes, this is any Art that targets a Sphere, Cone,
      Cube, Cylinder, or Line.</p></blockquote><p><strong>Partially Automated:
      </strong>Use the Activity on this Feature to toggle the +2 Bonus on and
      off when relevant.</p>
