  description:
    value: >-
      <p>When you would deal Damage to only one Creature with a Damaging
      Cantrip, you may choose to halve the Damage dealt by that Cantrip. If you
      do, all Creatures within 10 feet of the original target must succeed on a
      Dexterity Saving Throw against your Spell Save DC, or take the halved
      Damage of that Cantrip. This is considered to be casting an Art that
      targets an Area for the purpose of your Controlled Detonation
      Feature.</p><p>If you are within the area of your Splashing Cantrip, you
      automatically pass the Saving Throw.</p><p><strong>Partially Automated:
      </strong>Using this Feature creates an Enchantment on the Cantrip you
      choose, which in turn creates a Save Activity on that Cantrip. Creatures
      that fail this Saving Throw are marked with an effect that causes them to
      always be hit by the next Spell Attack, or fail the next Saving Throw
      against a Spell, but take half damage from it. Thus, you should use the
      "main" activity on that Cantrip against Creatures that have this effect;
      make sure to target all the Creatures at once, rather than one at a
      time.</p>
