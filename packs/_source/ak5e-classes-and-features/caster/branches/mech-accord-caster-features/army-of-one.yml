  description:
    value: >-
      <p>Your mastery of Arts Master drones now allows you to control more than
      one. You gain the following benefits:</p><p><strong>Additional Arts
      Drone.</strong> The maximum number of Arts Master Drones you can have at
      one time is increased to 2. When you use your Bonus Action to command your
      Arts Master, you may command all of your Arts Master’s at
      once.</p><p><strong>Residual Energy Recyclers.</strong> When you cast a
      levelled Art, until the end of your Turn, your Arts Master Drones deal
      additional Force Damage with their Originium Spark Action equal to the
      number of Arts Points you expended to cast that
      Art.</p><p><strong>Partially Automated: </strong>Use the Activity on this
      Feature after you cast an Art, and set the scaling to the amount of AP you
      expended.</p>
