  description:
    value: >-
      <p>Your drones are so infused with your Arts that their metal can mold
      like putty in your hands.</p><p>As a Bonus Action, you can use your Arts
      to enact emergency repairs on one of your Arts Masters; it must be within
      100 feet of you, and you must be able to see it. Expend an Amount of Arts
      Points up to twice your Proficiency Bonus, and roll 1d8 for each AP
      expended; that Arts Master recovers Hit Points equal to the total amount
      rolled, and gains any excess healing as Temporary Hit
      Points.</p><p><strong>Partially Automated: </strong>An additional activity
      will be triggered after the HP restoration; if there are any Hit Points
      left to overflow to Temporary Hit Points, enter them there.</p>
