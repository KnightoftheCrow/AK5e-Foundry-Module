  description:
    value: >-
      <p>You have created a drone known as an Arts Master, a flying construct
      operated by, and capable of chanelling, your Arts. The Arts Master is not
      sentient, but is considered allied to you and anyone allied to you. You
      can only have one Arts Master at a time.</p><blockquote><p><strong>The
      Arts Master in Combat.</strong> In Combat, the Arts Master acts during
      your Turn. It can use Reactions on its own, but it will not move or take
      Actions unless you use your Bonus Action to command it to non-verbally
      either move to a location of your choice, or take one Action in its Stat
      Block. To command your Arts Master in this way, you must be within 100
      feet of it.</p><p><strong>Restoring or Replacing the Arts Master.</strong>
      As a Construct, the Arts Master cannot regain Hit Points in most ways (See
      Page 9).</p><p>If an Arts Master is reduced to 0 Hit Points, it is
      destroyed. You can rebuild a destroyed Arts Master as a Long Rest Activity
      if you retain the destroyed Arts Master’s components. If they are not
      retrieved, replacing the components costs 500
      LMD.</p></blockquote><p><strong>Technology Expertise</strong>. You gain
      Proficiency in the Technology Skill; if you are already Proficient, you
      instead gain Expertise. Additionally, you gain Proficiency in Vehicles
      (Drones).</p><p><strong>Partially Automated.</strong></p>
