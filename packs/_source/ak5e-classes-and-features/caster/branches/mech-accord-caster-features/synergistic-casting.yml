  description:
    value: >-
      <p>You have refined the connection you form with your drones, allowing you
      to strike as one. You gain the following benefits:</p><p><strong>Arts
      Translocation.</strong> When you cast an Art, you may cast it as if you
      were in the space of one of your Arts Master Drones, instead of your own.
      However, if you do, that Art costs 1 additional Arts
      Point.</p><p><strong>Cantrip Duplication.</strong> Once per Turn, when you
      cast a Cantrip, you can expend 1 Arts Point to cast that Cantrip again as
      if you were in the space of one of your Arts Master Drones, targeting the
      same Creature or area. If you do so, that Arts Master Drone cannot make
      any Attacks until the beginning of your next Turn.</p><p><strong>Partially
      Automated: </strong>The Activites on this Feature allows you to track AP
      consumption and which Drones cannot Attack, but does not allow you to
      actually cast the Arts from the Drones position.</p>
