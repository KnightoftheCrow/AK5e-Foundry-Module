  description:
    value: >-
      <p>You excel at crushing enemies who are already reeling from your
      assault.</p><p>When you deal Damage to a Creature that has a negative
      Status Condition, that Creature loses 1d8 Hit Points. You can only deal
      this Damage to each Creature once per Turn.</p><p>This Damage is increased
      to 2d8 at Level 7, and 3d8 at Level 14.</p><p><strong>Partially Automated:
      </strong>Use the Activity on this Feature to cause the loss of Hit
      Points.</p>
