  description:
    value: >-
      <p>Status Conditions inflicted by you are more potent.</p><p>When you
      inflict any of the following Conditions using your Residual Suffering or
      Elemental Burst Features, the corresponding effect is added to that
      Condition.</p><table><thead><tr><td><p><strong>Condition</strong></p></td><td><p><strong>Additional
      Effect</strong></p></td></tr></thead><tbody><tr><td><p>Bleeding</p></td><td><p>The
      dice is increased one step to d8, from d6. When the Condition is removed,
      the Creature loses 2d8 Hit
      Points.</p></td></tr><tr><td><p>Blinded</p></td><td><p>The Creature glows
      with 10ft of Blinding Light, cannot become Invisible, and cannot take the
      Hide Action.</p></td></tr><tr><td><p>Burning</p></td><td><p>The Creature
      takes 1d8 additional Fire Damage, and cannot gain Hit
      Points.</p></td></tr><tr><td><p>Charmed</p></td><td><p>The Creature’s
      Speed is reduced to 0.</p></td></tr><tr><td><p>Corroded</p></td><td><p>The
      Creature’s DR is set to
      0.</p></td></tr><tr><td><p>Frightened</p></td><td><p>The Creature has
      Disadvantage on Attack
      Rolls.</p></td></tr><tr><td><p>Frozen</p></td><td><p>The Creature
      automatically fails Dexterity Saving
      Throws.</p></td></tr><tr><td><p>Necrotised</p></td><td><p>The Creature
      cannot take Reactions.</p></td></tr><tr><td><p>Nervous
      Impairment</p></td><td><p>The Creature loses 3 Hit Points the first time
      it moves each Turn, takes an Action, or takes a Bonus
      Action.</p></td></tr></tbody></table><p>From 10th Level, the Residual
      Suffering and Elemental Burst Features will instead apply upgraded Status
      Effects.. However, only some are automated; the following are
      not:</p><ul><li><p>The loss of Hit Points when Bleeding
      Ends</p></li><li><p>The 10ft of Bright Light on the Blinded
      Condition</p></li><li><p>The automatic Damage on Nervous
      Impairment</p></li></ul>
