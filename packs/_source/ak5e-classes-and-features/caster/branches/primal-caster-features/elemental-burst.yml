  description:
    value: >-
      <p>You learn to inflict indirect harm without committing to a larger
      Art.</p><p>As a Bonus Action during your Turn; choose a point you can see
      within 100 feet, and a Condition listed in your Residual Suffering
      Feature. All Creatures within a 20-foot-radius Sphere centred on that
      point must succeed on a Dexterity Saving Throw against your Spell Save DC
      or suffer the chosen Condition until the end of your next Turn.</p><p>Once
      you have used this Feature, you must complete a Short Rest before you may
      do so again.</p><p><strong>Automated: </strong>However, you will be
      prompted to choose the effect to apply AFTER Creatures have made the
      Saving Throw.</p>
