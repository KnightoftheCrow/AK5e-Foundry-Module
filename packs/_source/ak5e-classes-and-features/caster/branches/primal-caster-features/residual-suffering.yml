  advancement: []
  description:
    value: >-
      <p>You can cause your Arts to not immediately dissipate, causing lasting
      harm.</p><p>When you hit a Creature with a Spell Attack, or a Creature
      fails a Saving Throw against an Art cast by you, you may cause that
      Creature (no Action required) to suffer a Status Condition until the end
      of your next Turn, based on the Damage Type(s) dealt by that Art. If there
      are multiple Damage Types dealt, you may choose one effect to
      apply.</p><table><tbody><tr><td><p><strong>Damage
      Type</strong></p></td><td><p><strong>Condition</strong></p></td></tr><tr><td><p>Acid</p></td><td><p>Corroded</p></td></tr><tr><td><p>Bludgeoning</p></td><td><p>Frightened</p></td></tr><tr><td><p>Cold</p></td><td><p>Frozen</p></td></tr><tr><td><p>Fire</p></td><td><p>Burning</p></td></tr><tr><td><p>Force</p></td><td><p>Blinded</p></td></tr><tr><td><p>Lightning</p></td><td><p>Nervous
      Impairment</p></td></tr><tr><td><p>Necrotic</p></td><td><p>Necrotised</p></td></tr><tr><td><p>Piercing</p></td><td><p>Bleeding</p></td></tr><tr><td><p>Psychic</p></td><td><p>Charmed</p></td></tr><tr><td><p>Radiant</p></td><td><p>Blinded</p></td></tr><tr><td><p>Slashing</p></td><td><p>Bleeding</p></td></tr><tr><td><p>Thunder</p></td><td><p>Frightened</p></td></tr></tbody></table><p>You
      can use this Feature a number of times equal to twice your Proficiency
      Bonus, and regain all expended uses upon finishing a Long
      Rest.</p><p><strong>Partially Automated: </strong>Use the Activity on this
      Feature after fufilling the conditions, and make sure to pick the correct
      condition to apply!</p><p>From 10th Level, this Feature will instead apply
      the additional effects from Enduring Infliction. However, only some are
      automated; the following are not:</p><ul><li><p>The loss of Hit Points
      when Bleeding Ends</p></li><li><p>The 10ft of Bright Light on the Blinded
      Condition</p></li><li><p>The automatic Damage on Nervous
      Impairment</p></li></ul>
    chat: ''
