  description:
    value: >-
      <p>Your Arts are like your signature, signed in carnage.</p><p>You can
      conduct a ritual as a Long Rest Activity to choose a Signature Art from
      your known Arts of 5th Level or less. Your Signature Art gains the
      following benefits:</p><ul><li><p>You can reroll any result on a dice of 3
      or less on a Damage Roll, but must use the new
      result.</p></li><li><p>Damage dealt by that Art ignores Damage Reduction
      and Resistance.</p></li><li><p>If the Art cannot deal Damage, it costs 2
      fewer Arts Points to cast, to a minimum of 0.</p></li></ul><p>You may only
      have one Signature Art at a time; when you select another, the previous
      Signature Art loses all benefits.</p>
