  advancement: []
  description:
    value: >-
      <p>Your expertise with your chosen Arts grants you the following
      benefits:</p><p><strong>Elemental Being.</strong> You gain Resistance to
      the Damage Type associated with your chosen Standard Arts Pools, as shown
      in the table below.</p><table><tbody><tr><td><p><strong>Arts
      Pool</strong></p></td><td><p><strong>Damage
      Type</strong></p></td></tr><tr><td><p>Corrosion</p></td><td><p>Acid</p></td></tr><tr><td><p>Crude</p></td><td><p>Force</p></td></tr><tr><td><p>Earth</p></td><td><p>Piercing</p></td></tr><tr><td><p>Electric</p></td><td><p>Lightning</p></td></tr><tr><td><p>Flame</p></td><td><p>Fire</p></td></tr><tr><td><p>Fluid</p></td><td><p>Bludgeoning</p></td></tr><tr><td><p>Frost</p></td><td><p>Cold</p></td></tr><tr><td><p>Light</p></td><td><p>Radiant</p></td></tr><tr><td><p>Psychic</p></td><td><p>Psychic</p></td></tr><tr><td><p>Spatial</p></td><td><p>Force</p></td></tr><tr><td><p>Wind</p></td><td><p>Slashing</p></td></tr></tbody></table><p><strong>Maverick.</strong>
      When you cast an Art using Arts Points, you may replace any Damage Types
      on that Art with one of the Damage Types associated with one of your
      chosen Standard Arts Pools.</p><p><strong>Partially Automated:
      </strong>Use the "Establish Resistance" Activity to gain the Resistances
      you should have; make sure to use it again when you gain additional Arts
      Pools. The "Change Damage Type" Activites allow you to "enchant" an Art
      and change its Damage Type for the next cast, and so have to be used
      before hand. You cannot use Damage Types that don't match with your Arts
      Pools.</p>
    chat: ''
