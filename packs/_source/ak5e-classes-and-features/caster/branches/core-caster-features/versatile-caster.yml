  description:
    value: >-
      <p>You are already more versatile than most Casters. You gain the
      following benefits:</p><p><strong>Additional Arts Pool.</strong> Choose an
      Arts Pool from the Standard Arts Pools that you have not chosen
      previously; you learn all of the Arts in that Pool, and they are always
      Prepared.</p><p><strong>Rabbit from the Hat.</strong> As an Action once
      per Long Rest, you may choose an Art from any Standard Arts Pool. The Art
      must be of equal or lower Level than your Maximum Art Level. Until you
      complete a Long Rest, you may cast that Art as if it was part of one of
      your known Arts Pools.</p><p><strong>Partially Automated: </strong>The
      Additional Arts Pool is automated; there is no way to automate Rebbit from
      the Hat. Manually add the chosen Art to your Sheet.</p>
