  description:
    value: >-
      <p>In the world of Terra, technology and magic is practically
      indistinguishable. Most technology functions on Originium, and making
      Originium function requires a very basic grasp of Arts. Mech-Accord
      Casters take this to its ultimate
      conclusion.</p><blockquote><p><strong>Equipment and Proficiency
      Exchange</strong></p><p>When you choose this Branch, you may exchange any
      Tool Kit or Vehicle Proficiency you have for Proficiency with the
      Engineering Kit.</p><p>Additionally, when you choose this Branch, you may
      exchange one Toolkit from your Starting Equipment for an Engineering
      Kit.</p></blockquote>
