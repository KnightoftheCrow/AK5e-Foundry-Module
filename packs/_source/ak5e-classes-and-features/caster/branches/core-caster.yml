  description:
    value: >-
      <p>Versatility is the name of the game for Core Casters. Whereas other
      Casters are specialists, focusing in on a particular aspect of Arts, Core
      Casters choose to spread a wider net. While they make sacrifices for this
      versatility, do not mistake this for weakness; a Core Caster is not a
      master of any one field, but they are certainly no novice.</p>
