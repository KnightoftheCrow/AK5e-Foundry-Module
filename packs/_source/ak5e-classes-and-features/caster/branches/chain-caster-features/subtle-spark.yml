          '7':
            value: 8
          '11':
            value: 10
          '14':
            value: 12
      value: {}
      title: Number of Sparks
      hint: ''
  description:
    value: >-
      <p>The same talent that allows you to chain your Arts allows you to leave
      behind subtle marks on friend and foe alike. When you cast an Art that can
      only affect a single Creature, you can cause that Art to apply an
      additional effect (detailed below) to all Creatures it affects; these
      additional effects consume Sparks.</p><p><strong>Sparks:</strong> You have
      6 Sparks, which you expend to apply additional effects. You recover all
      expended Sparks whenever you finish a Long Rest.</p><p>You gain 2
      additional Sparks at 7th Level (Total of 8), 11th Level (Total of 10), and
      14th Level (Total of 12).</p><p><strong>Saving Throws:</strong> Some
      additional effects require their targets to make a Saving Throw to resist
      its effects. The Saving Throw DC is the same as your Spell Save DC, unless
      stated otherwise.</p><p><strong>Partially Automated: </strong>Use the
      Activities on this Feature to trigger your Sparks.</p>
    chat: ''
