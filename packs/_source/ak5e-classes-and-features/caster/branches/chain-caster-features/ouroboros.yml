  description:
    value: >-
      <p>Some would assume that your expertise does not extend to singular foes.
      They would be wrong, as your Arts can chain upon themselves.</p><p>When
      you use your Chain Art Feature, instead of causing the Art to chain to
      additional Creatures, you may instead give the target Creature
      Disadvantage on Saving Throws against that Art this
      Turn.</p><p><strong>Partially Automated: </strong>Use the Activity on this
      Feature before you cast your Art.</p>
