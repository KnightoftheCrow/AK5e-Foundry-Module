  description:
    value: >-
      <p>When you cast an Art that can only affect a single Creature, you can
      cause that Art to chain to up to two other Creatures within 15 feet of the
      original Target; these additional Creatures are also considered to be
      targets of that Art.</p><p>You can use this Feature a number of times
      equal to your Proficiency Bonus, and regain all expended uses when you
      complete a Long Rest.</p><p><strong>Automation not possible: </strong>The
      Activity on this Feature is just for tracking uses.</p>
