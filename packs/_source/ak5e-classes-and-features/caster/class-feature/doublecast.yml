    value: >-
      <p>Your potency as a Caster is the thing of legend, your name one for the
      history books.</p><p>Once per Short Rest, when you cast an Art with a
      Casting Time of an Action, you may immediately cast a second Art as part
      of the same Action. This second Art ignores restrictions on casting
      multiple levelled Arts during a single Turn.</p><p><strong>Automation not
