  description:
    value: >-
      <p>As you strength increases, you can manifest Arts that once strained you
      with increasing ease.</p><p>When you cast an Art at a lower level than
      your Maximum Art Level, that Art costs 1 fewer Arts Point, to a minimum of
      0. Beginning at 11th Level, those Arts instead cost 2 fewer Arts
      Points.</p><p><strong>Not Automated: </strong>Currently, this is not
      possible to automate. Instead, edit the Arts Points item on your Character
      Sheet at the appropriate level to reduce the costs of casting Arts below
      your maximum level by 1, or 2 beyond level 11.</p>
