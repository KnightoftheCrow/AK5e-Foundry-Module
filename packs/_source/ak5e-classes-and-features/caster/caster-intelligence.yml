  description:
    value: >-
      <p>A smirk comes across the girl’s face as the smoke clears. The corridor
      before her is filled with charred men and scorched armour, the remnants of
      her Arts still smouldering in the air like embers. One of the Power
      Armoured soldiers rises to their feet, pointing his weapon her way; her
      smirk grows yet wider.</p><p>Across the world, a feline steps into her
      hair salon alongside a new client. With a spring in her step, she gets the
      client sat down; her tools and supplies floating towards her, hovering in
      an orbit around her.</p><p>Further still, a Durin’s hands shake with
      concentration, her fingers locked in a white-knuckle grip on her staff. In
      front of her, a gigantic scrap construct dances to the beat of music,
      puppeted by invisible strings.</p><h3>Exceptional to a Man</h3><p>Not
      anyone can be a Caster. While most people on Terra are capable of using
      Arts to some extent, the ability to use Arts alone does not make you a
      Caster; Casters are defined by their exceptional ability with Arts. In
      military organisations, one must be combat-effective with just the
      strength of their Arts to be considered a Caster.</p><p>Those that become
      Casters often have trodden their own path to get there. Some are naturally
      talented in the extreme, some require intense study and training to
      develop their skills; most are somewhere in between. As a result, Casters
      tend to be exceptional people; people with drive, and a story to tell, or
      perhaps one yet to be written.</p><h3>Caster
      Traits</h3><table><tbody><tr><td data-colwidth="142"><p
      style="text-align:center"><strong>Primary
      Ability</strong></p></td><td><p>Intelligence</p></td></tr><tr><td
      data-colwidth="142"><p style="text-align:center"><strong>Hit Point
      Die</strong></p></td><td><p>D6</p></td></tr><tr><td data-colwidth="142"><p
      style="text-align:center"><strong>Saving Throw
      Proficiencies</strong></p></td><td><p>Two from the following (Choose when
      you select this Class): Intelligence, Wisdom,
      Charisma</p></td></tr><tr><td data-colwidth="142"><p
      style="text-align:center"><strong>Skill
      Proficiencies</strong></p></td><td><p>Choose 3 from: Arts, Lore,
      Investigation, Tech, Insight, Perception</p></td></tr><tr><td
      data-colwidth="142"><p style="text-align:center"><strong>Weapon
      Proficiencies</strong></p></td><td><p>Light Melee</p></td></tr><tr><td
      data-colwidth="142"><p style="text-align:center"><strong>Tool
      Proficiencies</strong></p></td><td><p>A Tool Kit/Vehicle Proficiency of
      your Choice</p></td></tr><tr><td data-colwidth="142"><p
      style="text-align:center"><strong>Armor
      Training</strong></p></td><td><p>Light Shields</p></td></tr><tr><td
      data-colwidth="142"><p style="text-align:center"><strong>Starting
      Equipment</strong></p></td><td><p>You start with the following Equipment,
      in addition to any Equipment granted by your Background.</p><ul><li><p>(A)
      1x Light Melee Weapon OR (B) 1x Light Shield</p></li><li><p>(A) 1x Arts
      Wand OR (B) 1x Arts Staff</p></li><li><p>1x Tool Kit that you are
      Proficient with</p></li></ul><p>OR</p><ul><li><p>1300
      LMD</p></li></ul></td></tr></tbody></table>
