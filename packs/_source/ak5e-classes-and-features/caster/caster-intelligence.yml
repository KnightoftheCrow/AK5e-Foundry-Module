      title: Caster Branch
      hint: >-
        You choose a Caster Branch which most closely fits the style you
        envision for yourself. Choose one from the following list; further
        details on these Branches can be found at the end of the Class
        Description. The Branch you choose grants you Features at Level 1, 3, 6,
        10, and 15.


        Core: Core Casters cast a wide net, exchanging specialisation for
        versatility. They are jack of all trades, but masters of none.


        Chain: Chain Casters bounce their Arts from target to target, turning
        one target into several. Woe betide foes clustered together.


        Mech-Accord: By combining their Arts with technology, these Casters can
        become a one man army.


        Mystic: All Casters are explosive in their force; Mystic Casters take
        this to its extreme, dealing devastating damage to one target.


        Primal: The strength of a Primal Caster lingers in the air, continuing
        to harm long after the Arts have struck; Primal Casters excel at causing
        Status Effects.


        Splash: Splash Casters are the worst nightmare of massed infantry,
        dealing horrific damage over large areas.
