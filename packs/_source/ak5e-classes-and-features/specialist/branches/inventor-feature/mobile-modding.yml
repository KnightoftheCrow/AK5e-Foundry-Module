  description:
    value: >-
      <p>You can expend 1 Prowess as an Action to choose a willing Creature
      within 5 feet of you; you may immediately apply one Modification of your
      choice to a piece of equipment they are wielding or wearing. This
      Modification does not cost an Invention, and expires after a
      minute.</p><p><strong>Gaining Prowess as an Inventor.</strong> As an
      Inventor, you gain 1 Prowess whenever a Creature who has activated one of
      your Modification this Turn reduces a Creature to 0 Hit Points. You can
      only gain Prowess in this way once per Turn.</p><p><strong>Not
      Automated.</strong></p>
