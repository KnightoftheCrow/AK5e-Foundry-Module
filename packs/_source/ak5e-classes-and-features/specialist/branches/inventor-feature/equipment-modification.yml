  description:
    value: >-
      <p>You can modify non-magical weapons and armour with special
      Modifications.</p><p><strong>Inventions.</strong> You have a number of
      Inventions equal to twice your Proficiency Bonus that you expend to modify
      equipment. Each Modification you apply consumes 1 Invention; this
      Invention is refunded when that Modification is
      removed.</p><p><strong>Modifying Equipment.</strong> Over the course of 10
      minutes, you can modify or remove Modifications from a non-magical Weapon
      or piece of Armour that you can work on for the duration. If you do so,
      you may apply any number of valid Modifications, listed below, to that
      equipment. A piece of equipment cannot have duplicate Modifications. If
      you cannot maintain a modification for whatever reason, such as the
      equipment being lost or stolen, the Modification is automatically removed
      after a week.</p><p><strong>Activating Modifications.</strong> Each
      Modification describes the Action cost to active that
      Modification.</p><p><strong>Instability.</strong> Any piece of equipment
      with Modifications on it has an Instability Value; this begins at 3, and
      increases by 1 for each Modification after the first placed on it. When a
      Creature activates a Modification, they roll a number of d6’s equal to
      that equipment’s Instability; if any of those dice show the same result as
      another die, that equipment suffers a breakdown; the wielder or wearer
      loses 1d8 Hit Points, plus an additional 1d8 for every Instability above 3
      that equipment has. This loss of Hit Points cannot reduce you below 1 Hit
      Point.</p><p><strong>Not Automated.</strong></p>
