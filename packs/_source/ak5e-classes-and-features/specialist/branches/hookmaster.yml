  description:
    value: >-
      <p>It is not a requirement for Specialists to be somewhat unhinged, but it
      does help. The battle style of a Hookmaster, complete with weapon too
      complex for even experienced warriors to make sense of, and combined with
      their death-defying feats of derring-do, certainly does not help that
      impression.</p><p>You get next Branch features:</p><table><tbody><tr><td
