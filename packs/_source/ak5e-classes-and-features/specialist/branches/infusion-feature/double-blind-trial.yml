  description:
    value: >-
      <p>As a Bonus Action while you are wielding a Weapon that does not have a
      Toxin applied to it, and have access to a Pharmacology Kit, you can expend
      1 Prowess and 1 use of your Alchemical Infusions Feature to roll 1d6 and
      apply the corresponding Toxin to that Weapon; this does not require you to
      physically possess the Toxin.</p><table><tbody><tr><td><p
      style="text-align:center"><strong>Result</strong></p></td><td><p
      style="text-align:center"><strong>Toxin</strong></p></td></tr><tr><td><p
      style="text-align:center">1</p></td><td><p>Neurologicial
      Inhibitor</p></td></tr><tr><td><p
      style="text-align:center">2</p></td><td><p>Necrotoxin</p></td></tr><tr><td><p
      style="text-align:center">3</p></td><td><p>Haemotoxin</p></td></tr><tr><td><p
      style="text-align:center">4</p></td><td><p>Cytotoxin</p></td></tr><tr><td><p
      style="text-align:center">5</p></td><td><p>Neurotoxin</p></td></tr><tr><td><p
      style="text-align:center">6</p></td><td><p>Bungarotoxin</p></td></tr></tbody></table><p><strong>Gaining
      Prowess as an Infuser.</strong> As an Infuser, you gain 1 Prowess when a
      Creature that either has the Poisoned Condition, or is affected by a Toxin
      created by you, is reduced to 0 Hit Points. Additionally, you gain 1
      Prowess when the effect of one of your Infusions causes a Creature to
      succeed on an Attack Roll, Skill Check, or Saving Throw it would otherwise
      have failed; you can only gain Prowess in this way once per
      Round.</p><p><strong>Not Automated.</strong></p>
