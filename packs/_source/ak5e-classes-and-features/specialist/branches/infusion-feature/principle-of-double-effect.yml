  description:
    value: >-
      <p>You are but a simple chemist, dispensing medication to those in need.
      If it happens to have some side effects, are you really to blame? You gain
      the following benefits:</p><p><strong>Additional Tool
      Proficiencies.</strong> You are Proficient with the Pharmacology
      Kit.</p><p><strong>Alchemical Infusions.</strong> As a Bonus Action, you
      can apply one of your chemical Infusions to a willing Creature you can see
      within 5 feet of you that is not a Construct or Undead for 1 minute.
      Infusions available for you to apply are in the Infusions table below. A
      Creature can only have one Infusion applied to them at a time; applying a
      second Infusion removes the effect of any other Infusions on that
      Creature. You may use this Feature a number of times equal to twice your
      Proficiency Bonus, and recover all expended uses when you complete a Long
      Rest.</p><p>To gain a benefit from an Infusion, that Creature must
      Leverage it. Each Infusion describes the scenarios under which it can be
      Leveraged. When a Creature chooses to Leverage an Infusion that has been
      applied to it by you, it must immediately make a Constitution Saving Throw
      against your Infuser DC. On a successful Save, they gain the benefit of
      that Infusion; on a failed Save, they gain the benefit of that Infusion,
      but they are additionally Dazed until the beginning of their next Turn,
      and cannot Leverage any Infusions while they have this Condition. An
      Infusion is not consumed when it is Leveraged.</p><p><strong>Not
      Automated.</strong></p>
