    value: >-
      <p>You gain the following benefits:</p><p><strong>Delivery
      Service.</strong> The range at which you can apply Infusions is increased
      to 30 feet.</p><p><strong>Questionable Rejuvenation.</strong> When you
      apply an Infusion to a Creature, and when a Creature succeeds on a Saving
      Throw against one of your Infusions, that Creature gains 1d10 Temporary
      Hit Points; if that Infusion is Procoagulant, these Temporary Hit Points
      are instead added to the Temporary Hit Points granted by that
      Infusion.</p><p><strong>Not Automated.</strong></p>
