  description:
    value: >-
      <p>Your toxins reach new heights of lethality, much to your joy. You gain
      the following benefits:</p><p><strong>Succumb.</strong> The DC of your
      Toxins is increased by your Proficiency Bonus.</p><p><strong>Toxic
      Shock</strong>. Creatures that fail a Saving Throw against your Toxins are
      now additionally Poisoned for the same duration as that Toxin’s
      Conditions. If the Toxin does not apply a Condition upon failing the
      Saving Throw (such as Haemotoxin), they are instead Poisoned until the end
      of their next Turn.</p><p><strong>Not Automated.</strong></p>
