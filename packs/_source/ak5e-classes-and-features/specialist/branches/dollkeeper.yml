  description:
    value: >-
      <p>Dollkeepers are an eccentric bunch, even amongst the already eccentric
      Specialists. Whether their Doll is a complex mechanical construct, an
      inanimate structure animated by Arts, or something even more poorly
      understood, they have a reputation for being somewhat strange, even
      disconcerting. Where a Dollkeeper is required however, almost no-one can
      fill their place.</p><p>You get next Branch
      features:</p><table><tbody><tr><td
      data-colwidth="50"><p>Level</p></td><td><p>Branch
      Feature</p></td></tr><tr><td data-colwidth="50"><p
      style="text-align:center">1</p></td><td><p>@UUID[Compendium.ak5e.ak5e-classes-and-features.Item.9bzTmqRBaNyKJfsS]{Living
      Doll}</p></td></tr><tr><td data-colwidth="50"><p
      style="text-align:center">5</p></td><td><p>@UUID[Compendium.ak5e.ak5e-classes-and-features.Item.2FhIk7b7h7SVaVhO]{Pull
      the
      Strings}</p><p>@UUID[Compendium.ak5e.ak5e-classes-and-features.Item.zkHfp73xP3ugr8S5]{Musical
      Chairs}</p></td></tr><tr><td data-colwidth="50"><p
      style="text-align:center">11</p></td><td><p>@UUID[Compendium.ak5e.ak5e-classes-and-features.Item.U3OFS444dkZA0Zmk]{Masquerade}</p></td></tr><tr><td
      data-colwidth="50"><p
