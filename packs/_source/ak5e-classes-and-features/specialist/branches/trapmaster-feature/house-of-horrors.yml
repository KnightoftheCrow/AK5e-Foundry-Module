  description:
    value: >-
      <p>To approach you is to die. To flee from you is to die. And the entire
      time, you’ll be there; laughing.</p><p>You gain the following
      benefits:</p><p><strong>Trap DC Increase.</strong> Your Trap DC is
      permanently increased by 5.</p><p><strong>Party Favours.</strong> Once per
      Long Rest as an Action, you can immediately set six traps, ignoring the
      time required. Additionally, the range at which you can set up those Traps
      is increased to 100 feet, and does not have to be in a location you can
      see, though you must be aware of it; it is not obvious to others where you
      have set these Traps.</p><p><strong>Not Automated.</strong></p>
