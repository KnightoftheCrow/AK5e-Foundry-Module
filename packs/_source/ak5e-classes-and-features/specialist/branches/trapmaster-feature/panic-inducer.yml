  description:
    value: >-
      <p>Your demeanour and trickery is well crafted to undermine the confidence
      of your enemies; or instill them with false confidence. You gain the
      following benefits:</p><p><strong>Irritating Distraction.</strong> If you
      make an Attack against a Creature, that Creature has Disadvantage on
      Saving Throws against your Traps and Warning Point Feature until the
      beginning of your next Turn.</p><p><strong>Jester’s Grace.</strong> You do
      not trigger Traps that you or your allies have placed when you move into
      the triggering area. Additionally, you have Advantage on any Saving Throw
      you make against Traps placed by you.</p><p><strong>Warning
      Point.</strong> When a Creature would trigger one of your Traps, you can
      instead cause them to instead have to succeed on an Intelligence Saving
      Throw against your Trap DC or have their Speed reduced to 0 until the
      beginning of their next Turn; they are not aware of the Trap, but feel as
      if they are in danger if they move. When you have delayed the activation
      of one of your Traps in this way, you may cause that Trap to trigger as a
      Reaction.</p><p><strong>Not Automated.</strong></p>
