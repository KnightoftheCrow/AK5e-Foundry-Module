  description:
    value: >-
      <p>You can expend 1 Prowess to immediately set a Trap as an Action rather
      than its normal time. Additionally, the range at which you can set up that
      Trap is increased to 60 feet; it is not obvious to others where you have
      set this new trap.</p><p><strong>Gaining Prowess as a Trapmaster.</strong>
      As a Trapmaster, you gain 1 Prowess at the beginning of your Turn if two
      or more Creatures have failed a Saving Throw against you or your Traps
      since your last Turn. Additionally, you gain 1 Prowess when a Creature is
      reduced to 0 Hit Points as a result of one of your
      Traps.</p><p><strong>Not Automated.</strong></p>
