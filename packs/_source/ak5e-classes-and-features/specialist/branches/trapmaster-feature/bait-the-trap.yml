  description:
    value: >-
      <p>You gain the following benefits:</p><p><strong>Come and Get
      Me.</strong> When you hit a Creature with an Attack, you can force them to
      make a Wisdom Saving Throw against your Trap DC. On a failed Save, during
      their next Turn they must attempt to move towards you if possible; they
      will not walk into easily visible harm, such as falling from a great
      height, as part of this movement. On a successful Save, nothing happens.
      You can use this Feature a number of times equal to your Proficiency
      Bonus, and regain all expended uses when you complete a Short or Long
      Rest.</p><p><strong>Not Automated.</strong></p>
