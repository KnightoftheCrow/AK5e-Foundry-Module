  description:
    value: >-
      <p>The very idea of a Skyranger specialist will draw strange looks from
      many people on Terra. The technology required for aircraft is not
      commonplace; the technology required for personal flight seems the realm
      of fiction. To a Skyranger however, the difference between a person and a
      drone is not that great if you refuse to care for your own
      safety.</p><p>You get next Branch features:</p><table><tbody><tr><td
      data-colwidth="50"><p>Level</p></td><td><p>Branch
      Feature</p></td></tr><tr><td data-colwidth="50"><p
      style="text-align:center">1</p></td><td><p>@UUID[Compendium.AK5e-Foundry-Module.ak5e-classes-and-features.Item.mFlEn0zBWbRslklu]{Take
      Flight}</p></td></tr><tr><td data-colwidth="50"><p
      style="text-align:center">5</p></td><td><p>@UUID[Compendium.AK5e-Foundry-Module.ak5e-classes-and-features.Item.WvbrwK1V21yZg60v]{Air
