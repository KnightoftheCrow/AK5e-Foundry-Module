    value: >-
      <p>You gain one of the following benefits based on your choice of Hunter
      or Bodyguard:</p><p><strong>Bodyguard.</strong> As a Reaction when a
      Creature with your Deathmark makes an Attack Roll against you while they
      are within your Reach, you can make a Weapon Attack against that Creature.
      If your Attack hits, subtract your Proficiency Bonus from the result of
      that Creature’s Attack Roll, possibly causing it to
      miss.</p><p><strong>Not Automated.</strong></p>
