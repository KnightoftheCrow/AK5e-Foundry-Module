  description:
    value: >-
      <p>No matter your path, you have reached its end. Only death can keep you
      from your mission now.</p><p>You gain one of the following benefits based
      on your choice of Hunter or Bodyguard:</p><p><strong>Hunter.</strong> Once
      per Long Rest as an Action, choose a Creature you can see within a
      distance equal to your Speed; you flash towards them with a lethal strike.
      You teleport to an unoccupied space within 5 feet of that Creature, and
      they must make a Dexterity Saving Throw against your Martial DC. Roll
      10d8. On a failed Save, that Creature loses Hit Points equal to the amount
      rolled. On a successful Save, they lose Hit Points equal to half the
      amount rolled. If the Creature has the Bleeding Condition, they lose twice
      as many Hit Points.</p>
