  description:
    value: >-
      <p>You gain one of the following ways to expend your Prowess based on your
      choice of Hunter or Bodyguard:</p><p><strong>Hunter (Sweeper)</strong>.
      While you are Hiding or Invisible, you can expend 1 Prowess as an Action.
      If you do so, until the end of the Turn your Reach is increased by 5 feet,
      and you may immediately make a Melee Attack against each Creature of your
      Choice within your Reach; you can only make one Attack against each
      Creature. If you hit a Creature with an Attack as part of this Action,
      that Creature immediately gains your Deathmark, even if it is on another
      Creature. At the end of the Action, your Deathmark returns to
      you.</p><p>Gaining Prowess as an Executor. As an Executor, you gain 1
      Prowess when a Creature with your Deathmark is reduced to 0 Hit Points.
      Once you have gained Prowess in this way, you may not do so again until
      the beginning of your next Turn.</p><p>You also can gain Prowess in an
      additional way based on your choice of Hunter or
      Bodyguard:</p><p><strong>Hunter:</strong> When you deal 30 or more Damage
      with a single Attack, you gain 1 Prowess.</p><p><strong>Not
      Automated.</strong></p>
