  description:
    value: >-
      <p>You gain one of the following benefits based on your choice of Hunter
      or Bodyguard:</p><p><strong>Bodyguard.</strong> When an allied Creature
      within 5 feet of you is subjected to an effect that allows them to make a
      Strength or Dexterity Saving Throw to take only half Damage, you can use
      your Reaction to choose a location within a distance equal to half of your
      Speed; both you and that Creature move to that location as close together
      as possible. If you moved to a location outside of that Area of Effect,
      both Creatures instead take no Damage if they succeed on the Saving Throw
      and only half Damage if they fail.</p><p><strong>Not
      Automated.</strong></p>
