  description:
    value: >-
      <p>Choose your path, and walk it until the end. You gain the following
      benefits:</p><p><strong>To Hunt, or Not To Hunt.</strong> When you adopt
      this Branch, you must choose whether you will be a Hunter or a Bodyguard;
      your Branch Features grant you different benefits based on your
      choice.</p><p><strong>Deathmark.</strong> You have a Deathmark that grants
      you benefits based on whether you or another Creature has it; you can
      transfer your Deathmark from yourself to a hostile Creature by making an
      Attack against them.</p><p>Your Deathmark returns to you when a Creature
      with your Deathmark is reduced to 0 Hit Points, or at the end of your Turn
      if you have not Attacked or dealt Damage to a hostile Creature with your
      Deathmark. When your Deathmark returns to you, you gain 3 Skill Points,
      and you can immediately take the Disengage Action as a
      Reaction.</p><p>While you have your Deathmark, you gain 3 Skill Points at
      the beginning of your Turn in combat. Additionally, you can take the Hide
      Action as a Bonus Action.</p><p>While another Creature has your Deathmark,
      you deal 1d4 additional Damage to that Creature when you hit them with an
      Attack; this additional Damage is increased to 2d4 at Level 7, and 3d4 at
      Level 14.</p><p>Furthermore, you gain an additional benefit against a
      Creature with your Deathmark based on your choice of Hunter or
      Bodyguard:</p><p><strong>Hunter:</strong> The Critical Range of your
      Attacks against Creatures with your Deathmark is increased by
      1.</p><p><strong>Not Automated.</strong></p>
