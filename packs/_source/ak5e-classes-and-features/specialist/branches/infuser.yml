  description:
    value: >-
      <p>“Healing Hands, Evil Heart”- that is how some describe those who are
      Infuser Specialists. There is perhaps some truth to this. Their chemistry
      aids their allies, but is never without consequence; heaven forbid that
      you are their foe, lest you fall prey to one of their lethal
      toxins.</p><p>You get next Branch features:</p><table><tbody><tr><td
