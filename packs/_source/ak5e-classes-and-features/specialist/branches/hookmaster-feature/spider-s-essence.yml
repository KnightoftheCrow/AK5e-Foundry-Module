  description:
    value: >-
      <p>Your familiarity with verticality makes even arachnids look like
      beginners. You gain the following benefits:</p><p><strong>Longer
      Hook.</strong> The Thrown Property of your Hooks is increased to Thrown
      (50/-)</p><p><strong>Spider’s Thread.</strong> As an Action, you can use
      your Hook to grapple to a surface of your choice above you, granting
      yourself a Climbing Speed until the beginning of your next Turn equal to
      the length of your Hook, but only when you are climbing towards your
      chosen point from the location you used this Feature. Additionally, until
      the beginning of your next Turn, other Creatures that begin climbing from
      the same location towards the same point also gain a climbing Speed equal
      to your Hook’s Range until the end of their Turn.</p><p><strong>Swing to
      Safety.</strong> You can now use your King of the Urban Jungle Feature as
      a Reaction while you are falling, as long as the height you are falling is
      enough for you to take falling Damage.</p><p><strong>Not
      Automated.</strong></p>
