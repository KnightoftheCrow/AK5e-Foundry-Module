  description:
    value: >-
      <p>As an Action while you have your Hook equipped, choose a Creature you
      can see within range of your Hook. That Creature must succeed on a
      Dexterity Saving Throw against your Martial DC. On a failed Save, you pull
      that Creature directly towards you until they are within 5 feet of you if
      they are no more than one size larger than you; if they are larger than
      this, you pull yourself directly towards them until you are within 5 feet
      of them. After this movement, you can make 6 Attacks with your Hook
      against that Creature with Advantage. Each of these Attacks deals
      additional Weapon Damage equal to half your Specialist Level.</p><p>If you
      have a Creature that is either Grappled by you or you are hooked onto to,
      you can use this Feature on that Creature, ignoring restrictions limiting
      use of your Hook. If you do so, that Creature automatically fails their
      Saving Throw against this Feature.</p><p>Once you have used this Feature,
      you may not do so again until you have completed a Long
      Rest.</p><p><strong>Not Automated.</strong></p>
