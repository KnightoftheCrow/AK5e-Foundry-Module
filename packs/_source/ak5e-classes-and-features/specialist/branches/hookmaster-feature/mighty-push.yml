  description:
    value: >-
      <p>As an Action, choose a Creature you can see within 5 feet; that
      Creature must make a Strength Saving Throw against your Martial DC. On a
      failed Save, they take 8d6 Bludgeoning Damage, and are knocked back 20
      feet. On a successful Save, they take half as much Damage and are pushed
      back only half as much. If they collide with a wall or other solid surface
      as part of this movement, they take Damage as if they had fallen that
      distance. If they collide with another Creature, they both take Damage as
      if they had fallen that distance.</p><p>You can use this Feature a number
      of times equal to your Proficiency Bonus, and regain all expended uses
      when you complete a Long Rest.</p><p><strong>Not Automated.</strong></p>
