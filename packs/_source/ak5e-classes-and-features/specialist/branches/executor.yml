  description:
    value: >-
      <p>Dollkeepers are an eccentric bunch, even amongst the already eccentric
      Specialists. Whether their Doll is a complex mechanical construct, an
      inanimate structure animated by Arts, or something even more poorly
      understood, they have a reputation for being somewhat strange, even
      disconcerting. Where a Dollkeeper is required however, almost no-one can
      fill their place.</p><p>You get next Branch
      features:</p><table><tbody><tr><td
