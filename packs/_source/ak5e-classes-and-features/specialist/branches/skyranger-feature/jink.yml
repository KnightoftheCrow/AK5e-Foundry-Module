  description:
    value: >-
      <p>Your prowess as a Skyranger grows, and you can express it in new ways.
      You gain the following benefits:</p><p><strong>Evasive
      Manoeuvres.</strong> As a Reaction when you would be hit by an Attack
      while wearing your Flight Suit, you can expend 1 Prowess to increase your
      AC by an amount equal to your Proficiency Bonus until the beginning of
      your next Turn, potentially turning that hit into a miss. Additionally, if
      the triggering Attack still hits you, you only take half
      Damage.</p><p><strong>Gaining Prowess as a Skyranger.</strong> You can now
      gain Prowess in the following ways, once per Turn:</p><ul><li><p>While you
      are Flying, a Creature on the ground that you have dealt Damage since the
      beginning of your last Turn is reduced to 0 Hit Points.</p></li><li><p>A
      Creature that is not touching the ground that you have dealt Damage since
      the beginning of your last Turn is reduced to 0 Hit Points.</p></li></ul>
