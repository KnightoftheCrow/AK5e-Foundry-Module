  description:
    value: >-
      <p>You gain additional benefits based on your current
      Doctrine:</p><p><strong>Air Superiority.</strong> When you reduce a
      Creature that is not touching the ground to 0 Hit Points, you can choose a
      grounded point you can see; this point can be no further away than twice
      the distance between that Creature and the ground directly below them. The
      Creature then crashes there, and all Creatures within 10 feet of the
      chosen point must succeed on a Dexterity Saving Throw against your Martial
      DC or take Thunder Damage equal to half of your Strafe
      Damage.</p><p><strong>Bombardment.</strong> When you use your Bombing Run
      Feature, you can remove 3d8 Damage from your Strafe Damage from that
      Bombing Run (before rolling), to modify that Bombing Run in one of the
      following ways:</p><ul><li><p><strong>Firebomb.</strong> The Damage is
      converted to Fire Damage, and Creatures that fail the Saving Throw suffer
      the Burning Condition.</p></li><li><p><strong>Gas Strike.</strong> The
      Damage is converted to Poison Damage, and Creatures that fail the Saving
      Throw are then Poisoned until the end of their next Turn. Additionally,
      that area is considered to be Difficult Terrain for any Creatures that
      breathe until the end of your next Turn.</p></li></ul><p><strong>Close Air
      Support.</strong> Creatures you hit with an Attack as part of your
      Swooping Dive have Disadvantage on Attacks against you until the beginning
      of your next Turn. Additionally, when you deal your Strafe Damage to a
      Creature, that Creature must succeed on a Wisdom Saving Throw against your
      Martial DC or become Frightened of you until the end of your next
      Turn.</p><p><strong>Not Automated.</strong></p>
