  description:
    value: >-
      <p>When you complete a Short or Long Rest, you choose from one of the
      following Doctrines; Air Superiority, Bombardment, or Close Air Support.
      Some of your Branch Features functions corresponds to your current
      Doctrine, described in those Features.</p><p>At this Level, your choice of
      Doctrine grants you the following benefits:</p><p><strong>Air Superiority
      (AA Missile).</strong> As an Action while you are wearing your Flight
      Suit, you can expend 1 Fuel to choose a Creature you can see within 100
      feet. That Creature must make a Dexterity Saving Throw against your
      Martial DC, taking Thunder Damage equal to your Strafe Damage on a failed
      Save, or half as much on a successful Save. If that Creature is not
      touching the ground, you do not roll, and instead use the highest number
      possible for each die.</p><p><strong>Bombardment (Bombing Run).</strong>
      As an Action while you are wearing your Flight Suit, you can expend 1 Fuel
      to choose a grounded point you can see within 30 feet and launch a bomb at
      it; if you are currently Flying, this distance is extended to 120 feet.
      All Creatures within 15 feet of the chosen point must make a Dexterity
      Saving Throw against your Martial DC, taking Thunder Damage equal to your
      Strafe Damage on a failed Save, or half as much on a successful
      Save.</p><p><strong>Close Air Support (Swooping Dive).</strong> When you
      take the Attack Action while you are wearing your Flight Suit, you can
      expend 1 Fuel to move up to your Speed as part of that Action.
      Additionally, when you make an Attack against a Creature within 10 feet of
      you as part of that Action, that Attack is made at Advantage, and deals
      additional Thunder Damage on hit equal to your Strafe Damage; a Creature
      can only take this additional Damage once per Turn.</p><p>Not
      Automated.</p>
