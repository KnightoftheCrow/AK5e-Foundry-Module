  description:
    value: >-
      <p>The difference between you and Icarus is that Icarus did not believe
      hard enough.</p><p>Once per Long Rest, while you are wearing your Flight
      Suit, you can transform it into its ultimate Combat Mode for 1 minute.
      While in Combat Mode, you gain the following
      benefits:</p><p><strong>Multirole:</strong> You are considered to be in
      all three Doctrines at once. Additionally, you may use any of the options
      of your Air Doctrine Feature without expending Fuel.</p><p><strong>Special
      Weapons.</strong> You gain access to the following Special Weapons for the
      duration; they do not need to be equipped for you to use
      them.</p><p><strong>Name:</strong> Core Cannon</p><p><strong>Weapon
      Category:</strong> Light Ranged</p><p><strong>Damage:</strong> 3d8
      Force</p><p><strong>Properties:</strong> Range (100/300), Rapid Fire,
