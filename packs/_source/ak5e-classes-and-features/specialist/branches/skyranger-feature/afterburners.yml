  description:
    value: >-
      <p>When you use your Evasive Manoeuvrers Feature, you can move up to your
      Speed as part of that Reaction. Additionally, once per Turn while you have
      increased Armour Class as a result of your Evasive Manoeuvrers Feature,
      when you move within 10 feet of a Creature you can force that Creature to
      succeed on a Dexterity Saving Throw against your Martial DC or take Fire
      Damage equal to your Strafe Damage.</p><p><strong>Not
      Automated.</strong></p>
