  description:
    value: >-
      <p>Your control over your Doll is legendary. You gain the following
      benefits:</p><p><strong>Doll Multiattack.</strong> When your Doll takes
      the Strike Action, it can now make two additional Attacks as part of that
      Action.</p><p><strong>Doll Raid.</strong> When you take the Attack Action,
      you can also cause your Doll to take the Strike Action (no Action
      required). Once you have used this Feature, you may not do so again until
      you have completed a Long Rest.</p><p><strong>Not Automated.</strong></p>
