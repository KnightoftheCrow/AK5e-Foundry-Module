  description:
    value: >-
      <p>Arts used in the Creation of your Doll have been used to reinforce you.
      You gain the following
      benefits:</p><ul><li><p><strong>Reciprocity.</strong> When either you or
      your Doll recovers Hit Points except by Resting, the other can gain
      Temporary Hit Points equal to the Hit Points
      recovered.</p></li><li><p><strong>Share Arts.</strong> When an Art that
      does not restore Hit Points or deal Damage is cast targeting you or your
      Doll, you can choose for the other to also be affected by that
      Art.</p></li></ul><p><strong>Not Automated.</strong></p>
