  description:
    value: >-
      <p>You gain the following benefits:</p><p><strong>Doll’s Dance.</strong>
      When you use an Operator Skill with Instant Duration, you may use it as if
      in your Doll’s space.</p><p><strong>Look in the Mirror.</strong> Your Doll
      gains the benefit of your Weapon Specialisation, Weapon Adept, Weapon
      Expertise, and Weapon Mastery Features.</p><p><strong>Marionette.</strong>
      When you would be reduced to 0 Hit Points, you can choose to swap places
      with your Doll if it is within 100 feet of you; if you do, your Doll takes
      the Damage you would have taken in your place. Once you have used this
      Feature, you may not do so again until you have completed a Long Rest.</p>
