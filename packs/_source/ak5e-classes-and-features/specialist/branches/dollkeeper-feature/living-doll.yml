  description:
    value: >-
      <p>You have created a Doll, a construct that is friendly to you and your
      companions. Visually, the Doll appears to be you but cannot speak; a
      Creature must succeed on a DC18 Perception Check to see that it is fake,
      unless there is an obvious clue that something is amiss. In addition, you
      can see and hear whatever your Doll can see and hear. The Doll is capable
      of wearing clothes, armour, and wielding weapons; it is Proficient with
      all Weapons and Armour that you are.</p><p><strong>The Doll in
      Combat.</strong> In Combat, the Doll acts during your Turn, and can use
      Reactions on its own. However, it will not move or take Actions unless you
      use your Bonus Action to command it to move; as part of that Bonus Action,
      you can also command it to take an Action in its Stat Block. To command
      the Doll in this way, you must be within 100 feet of
      it.</p><p><strong>Restoring or Replacing the Doll.</strong> As a
      Construct, the Doll cannot regain Hit Points in most ways. Whenever you
      roll Hit Dice to restore missing Hit Points, your Doll also recovers Hit
      Points equal to the amount rolled + your Constitution Modifier if it has
      at least 1 Hit Point, even if you do not regain Hit Points.</p><p>If the
      Doll is reduced to 0 Hit Points, it is destroyed. Replacing a Doll
      requires a Ritual performed as a Long Rest Activity if you retain the
      Doll’s components. If they are not retrieved, replacing the components
      requires 500 LMD. If you already have a Doll when you create one, the old
      Doll immediately perishes.</p><p><strong>Partially Automated. </strong>You
      can summon your doll and restore its use by using the feature. However,
      you need to manually give the doll the weapon of the character.</p>
