  description:
    value: >-
      <p>You gain additional benefits based on your Weapon
      Specialisation.</p><p><strong>Melee Combat.</strong> Once per Turn when
      you hit with a Melee Attack Roll, you can cause that Attack to deal
      additional Weapon Damage equal to half your Specialist
      Level.</p><p><strong>Ranged Combat.</strong> Once per Turn when you make a
      Ranged Attack Roll, you can double your Proficiency Bonus for the purpose
      of that Ranged Attack Roll only.</p><p><strong>Not Automated.</strong></p>
