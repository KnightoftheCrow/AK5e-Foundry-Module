  description:
    value: >-
      <p>You gain additional benefits based on your Weapon
      Specialisation.</p><p><strong>Melee Combat.</strong> Your Critical Range
      for Melee Attacks is improved by 1. When you roll to determine the Damage
      of a Melee Attack, you may expend 1 Prowess as a Bonus Action to roll one
      additional Damage die and add it to the total Damage.</p><p><strong>Ranged
      Combat.</strong> Whenever you have Advantage on a Ranged Attack Roll, you
      may roll an additional die, keeping only the die with the highest result.
      Additionally, you may expend 1 Prowess as a Bonus Action to give yourself
      Advantage on the next Ranged Attack Roll you make.</p><p><strong>Not
      Automated.</strong></p>
