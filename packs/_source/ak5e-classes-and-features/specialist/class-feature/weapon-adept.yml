  description:
    value: >-
      <p>You gain additional benefits based on your Weapon
      Specialisation.</p><p><strong>Melee Combat.</strong> When you take the
      Attack Action, you may make one additional Attack as part of that Action;
      this Attack must be a Melee Attack. Additionally, when you roll a 1 or 2
      on one or more Damage dice for a Melee Attack, you can reroll those dice;
      you must use the new results.</p><p><strong>Ranged Combat.</strong> When
      you take the Attack Action, you may make one additional Attack as part of
      that Action; this Attack must be a Ranged Attack. Additionally, when you
      roll a 1 for a Ranged Attack Roll, you may reroll that die; you must use
      the new result.</p><p><strong>Not Automated.</strong></p>
