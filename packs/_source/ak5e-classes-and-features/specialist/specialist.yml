  description:
    value: >-
      <h3>Core Specialist Traits</h3><table><tbody><tr><td
      data-colwidth="142"><p style="text-align:center"><strong>Primary
      Ability</strong></p></td><td><p>Dexterity</p></td></tr><tr><td
      data-colwidth="142"><p style="text-align:center"><strong>Hit Point
      Die</strong></p></td><td><p>D8 per Specialist level</p></td></tr><tr><td
      data-colwidth="142"><p style="text-align:center"><strong>Saving Throw
      Proficiencies</strong></p></td><td><p>Dexterity + one of your choice from
      thefollowing: Wisdom, Charisma</p></td></tr><tr><td data-colwidth="142"><p
      style="text-align:center"><strong>Skill
      Proficiencies</strong></p></td><td><p>Choose 3 from: Acrobatics, Sleight
      of Hand, Stealth, Tech, Perception, Wilderness</p></td></tr><tr><td
      data-colwidth="142"><p style="text-align:center"><strong>Weapon
      Proficiencies</strong></p></td><td><p>Light Melee, Light
      Ranged</p></td></tr><tr><td data-colwidth="142"><p
      style="text-align:center"><strong>Tool
      Proficiencies</strong></p></td><td><p>Two Tool Kits of your
      Choice</p></td></tr><tr><td data-colwidth="142"><p
      style="text-align:center"><strong>Armor
      Training</strong></p></td><td><p>Light Armour, Medium Armour, Light
      Shields</p></td></tr><tr><td data-colwidth="142"><p
      style="text-align:center"><strong>Starting
      Equipment</strong></p></td><td><p>Choose A or B:</p><p>(A): (a) 1x Light
      Melee Weapon or (b) 1x Light Ranged Weapon;</p><p>(a) 1x Heavy Melee
      Weapon or (b) 1x Light Shield;</p><p>(a) Reinforced Outfit or (b)
      Underarmour;</p><p>1x Tool Kit you are Proficient with;</p><p>(B): 1300
      LMD.</p></td></tr></tbody></table><h3>Powerfully Individual</h3><p>It is
      nearly impossible to summate Specialists in a succinct manner. Some
      describe them as those that simply do not fit under a more defined
      heading. While there is some truth to this, it does not mean Specialists
      have not felt a calling. Specialists are those so dedicated to a
      particular style, often an unconventional one, that to place them under a
      more established heading would do both a disservice. The application of a
      Specialist may be narrow, but when they are within their zone, you will
      never wish for anyone else.</p>
    chat: ''
