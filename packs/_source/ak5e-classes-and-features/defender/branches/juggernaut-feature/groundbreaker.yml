  description:
    value: >-
      <p>As an Action, you slam the ground with such force that it cracks and
      splinters. All other Creatures touching the ground within 30 feet of you
      must make a Strength Saving Throw against your Martial DC. On a failed
      Save, they take 8d12 Thunder Damage; on a successful Save, they take half
      as much Damage. The affected area is then considered to be Difficult
      Terrain for anyone except you.</p><p>Once you have used this Feature, you
      may not do so again until you finish a Long Rest.</p><p><strong>Not
      Automated.</strong></p>
