  description:
    value: >-
      <p>While you are wearing Heavy Armour, you have an Arts Barrier
      surrounding your person. When you would take Damage from another Creature,
      a layer of the Barrier shatters, halving that instance of Damage. You may
      reform a layer of the Barrier as an Action during your Turn, or as a Bonus
      Action by expending 1 Resilience.</p><p>The maximum layers of Barrier you
      can have is 1. This maximum is increased to 2 at 7th Level, and 3 at 14th
      Level.</p><p><strong>Not Automated.</strong></p>
