  description:
    value: >-
      <p>As an Action during your Turn, choose a point you can see within 30
      feet. You move in a single straight line to that location; you can move
      through Creatures and objects of equal size or smaller than you as part of
      this movement. Any Creature or Object you moved through during this
      movement must make a Dexterity Saving Throw. On a failed Save, they take
      4d12 Bludgeoning Damage, and are knocked 10 feet directly away from you.
      On a successful Save, they take half as much Damage, and are not knocked
      back.</p><p>Once you have used this Feature, you may not do so again until
      you complete a Short Rest, or expend 2 Resilience (no Action required) to
      restore your use of it.</p><p><strong>Not Automated.</strong></p>
