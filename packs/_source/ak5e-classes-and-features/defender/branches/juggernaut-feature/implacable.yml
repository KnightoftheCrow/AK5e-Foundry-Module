  description:
    value: >-
      <p>You cannot be stopped, and punish those who attempt to do
      so.</p><p><strong>Rolling Boulder.</strong> Your Speed cannot be reduced
      by another Creature. If you gain a Condition that would reduce your Speed,
      you suffer all other effects of that Condition, but your Speed is not
      reduced.</p><p><strong>Shatterstorm.</strong> When a layer of your Barrier
      shatters, roll 1d8 and add your Constitution Modifier; you deal that much
      Force Damage to Creatures of your choice within 10 feet of
      you.</p><p><strong>Not Automated.</strong></p>
