  description:
    value: >-
      <p>Fortress Defenders turn the sluggish nature of Defenders into their
      strength, pounding their foes with explosives from a distance as they
      slowly advance. It is not uncommon for Defenders treading this path to be
      the core of their team, a hardpoint to rally around when hell breaks
      loose.</p><p>You get next Branch Features:</p><table><tbody><tr><td
