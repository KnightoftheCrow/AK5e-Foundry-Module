  description:
    value: >-
      <p>An Artshield is a specialist in the field of combatting Casters. They
      combine heavy equipment and rigorous training to develop the necessary
      strength to weather the storm, augementing their significant strength with
      their own unique Arts. When hostile Arts threaten their allies, Artshields
      stand to take the brunt, before retailiating with disruptive
      strikes.</p><p>You get next Branch features:</p><table><tbody><tr><td
      data-colwidth="50"><p>Level</p></td><td><p>Branch
