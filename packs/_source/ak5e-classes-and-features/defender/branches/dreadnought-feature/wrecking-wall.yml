  description:
    value: >-
      <p>Once per Long Rest as an Action, you can choose a Creature you can see
      within five feet of you; that Creature must make a Constitution Saving
      Throw against your Martial DC. On a failed Save, they take 10d6
      Bludgeoning Damage and are Stunned; they may reattempt the Saving Throw at
      the end of each of their Turns, ending the Condition on a success. On a
      successful Save, they take half as much Damage, and are not
      Stunned.</p><p>Damage from this Feature ignores Damage Reduction and
      Resistances.</p><p><strong>Not Automated.</strong></p>
