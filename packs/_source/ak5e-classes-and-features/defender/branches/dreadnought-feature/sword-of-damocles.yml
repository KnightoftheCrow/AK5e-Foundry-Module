  description:
    value: >-
      <p>You punish those powerful foes who would dare to ignore you. You gain
      the following benefits:</p><ul><li><p><strong>Leaping Offence.</strong>
      When you use your Leaping Defence Feature, if the Attacking Creature is an
      Elite or Leader Creature, you can expend 1 Resilience to make an Attack of
      Opportunity against them after their Attack (no Action
      required).</p></li><li><p><strong>Tear them Down.</strong> When an Elite
      or Leader Creature within your Reach makes an Attack against a Creature
      that is not you, or forces them to make a Saving Throw, you can make an
      Attack of Opportunity against them (no Action
      required).</p></li></ul><p><strong>Not Automated.</strong></p>
