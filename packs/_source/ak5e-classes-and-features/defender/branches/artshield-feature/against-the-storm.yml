  description:
    value: >-
      <p>You develop tactics for countering Arts Users, resisting their powers
      and employing their own strength against them. You gain the following
      benefits:</p><ul><li><p><strong>Arts Resistance.</strong> You have
      Advantage on Saving Throws made against
      Arts.</p></li><li><p><strong>Spellshield.</strong> Creatures benefitting
      from your Shelter Feature have Advantage on Saving Throws against Arts you
      can see. Additionally, if a Creature benefitting from your Shelter Feature
      would take half Damage as a result of succeeding on a Saving Throw against
      an Art you can see, you can expend 2 Resilience (no Action required) to
      cause them to take no damage from that Art
      instead.</p></li></ul><p><strong>Not Automated.</strong></p>
