  description:
    value: >-
      <p>You have mastered your resistance to Arts so completely that you can
      nullify them utterly.</p><p>As a Reaction, you may create a spherical
      barrier centred on you with a radius of up to 20 feet (your choice). This
      barrier is visible, appearing silvery and translucent, and lasts until the
      end of your next Turn. For the duration, all Creatures within the barrier
      cannot be affected by Arts, Art-like Effects, or take Arts Damage. If
      there are any Arts affecting a Creature when they enter the area, or when
      they begin their Turn within the area, those effects are ended.</p><p>Once
      you have used this Feature, you may not do so again until you have
      finished a Long Rest.</p>
