  description:
    value: >-
      <p>You have all but made the weapons of your enemy into your own. You gain
      the following benefits:</p><ul><li><p><strong>Arts Absorption.</strong>
      When you take Arts Damage, you may absorb some of the energy from that Art
      (no Action required). After you have absorbed energy in this way, you may
      expel it as an Action during your Turn. All Creatures within a 10ft Square
      originating from you must make a Dexterity Saving Throw against your
      Martial DC. On a failed Save, they take 3d6 Force Damage; on a successful
      Save, they take half as much Damage.</p><p>This Damage is increased to 6d6
      at Level 7, and 9d6 at Level 14.</p></li><li><p><strong>Empowered
      Strikes.</strong> Your Melee Weapon Attacks deal an additional 1d6 Force
      Damage. While you have an active Operator Skill, your Melee Weapon Attacks
      instead deal an additional 2d6 Force Damage.</p></li></ul><p><strong>Not
      Automated.</strong></p>
