  description:
    value: >-
      <p>You have further refined your technique for shutting down hostile
      Casters; the best defence is a good offence. You gain the following
      benefits:</p><ul><li><p><strong>Reactive Defence.</strong> When a Unit
      within your Reach casts an Art, you may make an Attack of Opportunity
      against them.</p></li><li><p><strong>Concentration Breaker.</strong> When
      you damage a Creature that is Concentrating on an Art, it has Disadvantage
      on the Saving Throw it makes to maintain
      Concentration.</p></li></ul><p><strong>Not Automated.</strong></p>
