  description:
    value: >-
      <p>Your enduring enmity of enemy Casters leads you to the forefront, an
      elemental hell few but you can endure. You intend to change that. You gain
      the following benefits:</p><ul><li><p><strong>Improved Arts
      Resistance.</strong> You always have DR against Arts Damage equal to half
      of your DR against Physical Damage, rounding
      up.</p></li><li><p><strong>Leaping Ward.</strong> You can now use your
      Leaping Defence Feature when a Creature within a distance equal to half
      your Speed would make a Saving Throw against an Art or Art-like effects.
      If you do so, both you and that allied Creature are considered to be
      Resistant to the Damage dealt by that Art this
      Turn.</p></li></ul><p><strong>Not Automated.</strong></p>
