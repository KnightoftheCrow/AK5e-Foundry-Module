  description:
    value: >-
      <p>The emergence of the Sentry represents a modern invention, and a shift
      in thinking. As compact, powerful ranged weapons like firearms and other
      projectors continue to advance, there grows a need for someone to take
      point, as it were. Someone who can still make use of these technological
      advancements, but does not fear reprisal from the enemy- and so was the
      Sentry born.</p><p>You get next Branch features:</p><table><tbody><tr><td
