  description:
    value: >-
      <p><strong>Concussive Munition</strong></p><p><strong>Damage:</strong>
      Thunder Damage equal to one roll of your Munitions
      Dice.</p><p><strong>Additional Effect:</strong> Until the end of their
      next Turn, affected Creatures’ Speed is halved, and they have the Dazed
      Condition.</p><p></p><p><strong>Corrosive
      Munition</strong></p><p><strong>Damage:</strong> Acid Damage equal to one
      rolls of your Munitions Dice.</p><p><strong>Additional Effect:</strong>
      Affected Creatures gain the Corroded Condition until they use an Action
      during their Turn to remove it.</p><p></p><p><strong>Flare
      Munition</strong></p><p><strong>Damage:</strong> Fire Damage equal to one
      roll of your Munitions Dice.</p><p><strong>Additional Effect:</strong>
      Until the end of your next Turn, affected Creatures cannot benefit from
      the Invisible Condition, and Attack Rolls against those Creatures are made
      at Advantage.</p><p></p><p><strong>Explosive
      Munition</strong></p><p><strong>Damage:</strong> Acid, Fire, or Thunder
      Damage (your Choice) equal to two rolls of your Munitions
      Dice.</p><p><strong>Additional Effect:</strong>
      None.</p><p></p><p><strong>Incendiary
      Munition</strong></p><p><strong>Damage:</strong> Fire Damage equal to one
      roll of your Munitions Dice.</p><p><strong>Additional Effect:</strong>
      Affected Creatures gain the Burning
      Condition.</p><p></p><p><strong>Shrapnel
      Munition</strong></p><p><strong>Damage:</strong> Slashing Damage equal to
      one roll of your Munitions Dice.</p><p><strong>Additional Effect:</strong>
      Affected Creatures gain the Bleeding Condition.</p><p></p><p><strong>Not
      Automated.</strong></p>
