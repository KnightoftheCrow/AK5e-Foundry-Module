  description:
    value: >-
      <p>The essence of a fortification is both to protect and to provide a
      location to attack from; you have refined your technique to facilitate
      both of these things.</p><ul><li><p><strong>Fortification.</strong> Once
      per Turn, while you are Entrenched, you may take the Shelter Action
      without expending an Action.</p></li><li><p><strong>Stop their
      Advance.</strong> When a Creature that you can see moves within 100 feet
      of you while you have any Munitions loaded, you can expend one Resilience
      to fire your loaded Munitions at that Creature as a Reaction; you must
      choose a point as close to that Creature as possible as the target for
      your Munitions.</p></li></ul><p><strong>Not Automated.</strong></p>
