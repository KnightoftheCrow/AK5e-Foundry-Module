    value: >-
      <p>None cross your field of fire unharmed. You gain the following
      benefits:</p><ul><li><p><strong>Retributor.</strong> Once per Round, you
      may use your Advance and Fire Feature without expending use of your
      Reaction.</p></li><li><p><strong>Torrent of Lead, Wall of Steel.</strong>
      Once per Long Rest, you may activate this Feature during your Turn (no
      Action required). Until the end of your next Turn, when you make a Ranged
      Attack as a result of your Advance and Fire Feature, you can make an
      additional Attack (no Action required) against the same Creature; these
      Attacks cannot generate further Attacks.</p></li></ul><p><strong>Not
      Automated.</strong></p>
