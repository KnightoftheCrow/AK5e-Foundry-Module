  description:
    value: >-
      <p>Establish a forward position, attack, move, repeat. These are the
      Sentries’s lessons.</p><ul><li><p><strong>Additional Weapon
      Proficiencies.</strong> You gain Proficiency with Light Ranged Weapons and
      Heavy Ranged Weapons.</p></li><li><p><strong>Plant Pavise.</strong> As a
      Bonus Action while you have a Heavy Shield equipped, you can plant your
      shield in the ground. Allied Creatures, including you, within 10 feet of
      your planted shield gain the benefit of your Shelter Action, so long as
      the attack originates from the opposite side of the shield from that
      Creature’s perspective. Additionally, your planted shield functions as
      Half Cover.</p></li></ul><p>You can recover your shield as an Interact
      with Object while you are within 5 feet of it, and you can only have one
      shield planted at a time. Other Creatures cannot move your planted
      Shield.</p><p><strong>Not Automated.</strong></p>
