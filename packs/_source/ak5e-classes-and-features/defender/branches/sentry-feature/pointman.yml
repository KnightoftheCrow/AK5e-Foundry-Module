  description:
    value: >-
      <p>Whether defending the backline or the frontline, Sentry Defenders are
      equally at home. You gain the following
      benefits:</p><ul><li><p><strong>Bar the Gates.</strong> When you use your
      Leaping Defence Feature while you are wielding a Heavy Shield, you can use
      your Plant Pavise Feature as part of that Reaction. If you are instead
      within 5 feet of your planted shield when you would use Leaping Defence,
      you can expend 1 Resilience to recover your shield before making the
      movement; you may still plant it again as part of that Leaping
      Defence.</p></li><li><p><strong>Heads Down.</strong> When a Creature
      within 5 feet of your planted shield would make a Dexterity Saving Throw
      against an effect they can see, you can expend 1 Resilience (no Action
      required) to cause that Creature to automatically pass that Saving
      Throw.</p></li></ul><p><strong>Not Automated.</strong></p>
