  description:
    value: >-
      <p>You can cast Arts; the information below details how you use those
      rules as a Guardian.</p><p><strong>Arts Points:</strong> The Guardian Arts
      Casting table shows how many Arts Points you have to cast your Level 1+
      Arts. You regain all expended Arts Points when you finish a Long
      Rest.</p><p><strong>Maximum Arts Level:</strong> The Guardian Arts Casting
      table shows the maximum Level you can cast an Art at, based on your
      Defender Level.</p><p><strong>Spellcasting Ability:</strong> When you gain
      this Feature, choose either Intelligence, Wisdom, or Charisma; that is
      your Spellcasting Ability.</p><p><strong>Spellcasting Focus:</strong>
      Shields equipped by you gain the Casting Unit Property for the
      duration.</p><p><strong>Guardian Arts Pool:</strong> When you gain this
      Feature, you learn all of the Arts from the Healing Arts Special Arts Pool
      of 5th Level or less, including all Cantrips in that Pool. These Arts are
      always prepared.</p><p><strong>Not Automated.</strong></p>
