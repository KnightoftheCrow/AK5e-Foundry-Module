  description:
    value: >-
      <p>You may have dedicated a part of yourself to the healing of others, but
      you are still a frontline fighter; woe betide those who forget
      that.</p><p>You can activate this Feature as a Bonus Action. For the next
      minute, whenever you make a Melee Attack against a Creature, you may
      restore 2d6 Hit Points to a Creature of your choice that you can see
      within 30 feet.</p><p>Once you have used this Feature, you may not do so
      again until you complete a Long Rest.</p><p><strong>Not
      Automated.</strong></p>
