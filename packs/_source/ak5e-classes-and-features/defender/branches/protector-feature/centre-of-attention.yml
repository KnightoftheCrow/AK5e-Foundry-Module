  description:
    value: >-
      <p>As an Action, or as a Bonus Action if you expend 2 Resilience,
      Creatures of your choice within 10 feet of you must succeed on a Wisdom
      Saving Throw against your Protector DC, or be Taunted by you until the end
      of their next Turn. A Taunted Creature must Attack you during its Turn, if
      it is able to.</p><p>You can use this Feature a number of times equal to
      your Constitution Modifier, and regain all expended uses upon finishing a
      Long Rest.</p><p><strong>Not Automated.</strong></p>
