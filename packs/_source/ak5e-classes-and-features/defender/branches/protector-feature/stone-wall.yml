  description:
    value: >-
      <p>When a Creature hits you with a Melee Attack while you are wielding a
      shield, you can attempt to knock them off Balance as a Reaction. That
      Creature must succeed on a Strength Saving Throw against your Protector DC
      or take 1d8 + your Constitution Modifier Bludgeoning Damage, and be
      knocked Off Balance until the end of your next Turn.</p><p>Attacks against
      Creatures that have been knocked Off Balance are made at
      Advantage.</p><p><strong>Not Automated.</strong></p>
