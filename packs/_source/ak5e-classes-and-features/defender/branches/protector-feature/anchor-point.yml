  description:
    value: >-
      <p>Your expertise is in the protecting of others, and it shows. While you
      are wielding a Shield with the Bulwark Property, you gain the following
      benefits:</p><ul><li><p><strong>Impenetrable.</strong> When you or a
      Creature benefitting from your Shelter Action would take Damage, you can
      expend 1 Resilience as a Reaction to grant that Creature Damage Reduction
      against that Damage equal to half of your Physical Damage Reduction (this
      effect is not cumulative). You may expend 1 further Resilience (no Action
      required) to refund use of your Reaction.</p></li><li><p><strong>Improved
      Shelter.</strong> The Radius of your Shelter Action is increased to 10
      feet from 5 feet. Additionally, Creatures benefitting from your Shelter
      Action have Advantage on Strength and Dexterity Saving Throws against
      effects you can see.</p></li></ul><p><strong>Not Automated.</strong></p>
