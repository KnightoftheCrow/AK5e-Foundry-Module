  description:
    value: >-
      <p>You don’t have to defeat your foes, per se. You just have to outlast
      them.</p><ul><li><p><strong>Punishment.</strong> When you hit a Creature
      with an Attack, or a Creature fails a Saving Throw against you, that
      Creature has Disadvantage on the next Attack Roll it makes before the end
      of your next Turn.</p></li><li><p><strong>Unending Defence.</strong> If
      your Turn ends and you have no Resilience remaining, you recover 1
      Resilience.</p></li></ul><p><strong>Not Automated.</strong></p>
