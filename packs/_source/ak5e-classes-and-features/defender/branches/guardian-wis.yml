  description:
    value: >-
      <p>A Defender’s role is to protect; all Defenders would agree, but what
      they protect is a matter of individual taste. For some, it’s themselves,
      others their allies; Guardian Defenders fall in the latter camp with
      fervour. It is not enough to simply prevent harm coming to them, but to
      cure any harm that does befall them.</p><p>You get next Branch
      Features:</p><table><tbody><tr><td
