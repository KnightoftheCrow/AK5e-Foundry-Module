  description:
    value: >-
      <h3>Core Defender Traits</h3><table><tbody><tr><td data-colwidth="142"><p
      style="text-align:center"><strong>Primary
      Ability</strong></p></td><td><p>Constitution</p></td></tr><tr><td
      data-colwidth="142"><p style="text-align:center"><strong>Hit Point
      Die</strong></p></td><td><p>D12 per Defender level</p></td></tr><tr><td
      data-colwidth="142"><p style="text-align:center"><strong>Saving Throw
      Proficiencies</strong></p></td><td><p>Constitution + one of your choice
      from thefollowing: Wisdom, Strength</p></td></tr><tr><td
      data-colwidth="142"><p style="text-align:center"><strong>Skill
      Proficiencies</strong></p></td><td><p>Choose 3 from: Athletics, Lore,
      Tech, Perception, Intimidation, Wilderness</p></td></tr><tr><td
      data-colwidth="142"><p style="text-align:center"><strong>Weapon
      Proficiencies</strong></p></td><td><p>All Melee
      Weapons</p></td></tr><tr><td data-colwidth="142"><p
      style="text-align:center"><strong>Tool
      Proficiencies</strong></p></td><td><p>Any Tool
      Kit/Vehicle</p></td></tr><tr><td data-colwidth="142"><p
      style="text-align:center"><strong>Armor
      Training</strong></p></td><td><p>All Armours, All
      Shields</p></td></tr><tr><td data-colwidth="142"><p
      style="text-align:center"><strong>Starting
      Equipment</strong></p></td><td><p>Choose A or B:</p><p>(A): (a) 1x Light
      Melee Weapon or (b) 1x Light Shield;</p><p>(a) 1x Heavy Melee Weapon or
      (b) 1x Light Shield or (c) Heavy Shield;</p><p>(a) Combat Gear or (b)
      Defender Armour;</p><p>1x Tool Kit you are Proficient with;</p><p>(B):
      1300 LMD.</p></td></tr></tbody></table><h3>The Hammer and The
      Anvil</h3><p>The title of “Defender” invokes a particular image;
      heavy-set, heavy-clad warriors bearing massive shields, and bearing the
      brunt of the dangerous attacks. While this is indeed true for many
      Defenders, the spectrum of those who call themselves by that name is far
      too vast to be encompassed by such a simple image. Defenders are not just
      found in the front lines, meeting foes arm-against-arm, being found
      anywhere something requires protection. As for what that something may be,
      and how they defend it, is a matter of personal consideration.</p>
    chat: ''
