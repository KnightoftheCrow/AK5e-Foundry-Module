  description:
    value: >-
      <p>As a Defender, you can draw upon your innate fortitude to act quickly
      when it is most required. You have an amount of Resilience shown in the
      Resilience column of the Defender Features Table, and recover all expended
      Resilience when you finish a Long Rest.</p><p>Resilience is used by your
      other Class Features and Branch Features, as directed by those Features,
      to improve your Action Economy or imbue additional
      effects.</p><p><strong>Automated.</strong></p>
