  description:
    value: >-
      <p>You know best how to wield your considerable defences. When you would
      take Damage as a result of a hostile action, you can use this Feature as a
      Reaction; double any DR you have against that instance of
      Damage.</p><p>Once you have used this Feature, you may not do so again
      until you finish a Short Rest, or expend 2 Resilience during your Turn (no
      Action required) to restore your use of it.</p><p><strong>Not
      automated.</strong></p>
