  description:
    value: >-
      <p>When a allied Creature you can see within a distance equal to half your
      Speed is hit by an Attack, you may move to an unoccupied space within 5
      feet of that allied Creature as a Reaction; this movement does not provoke
      Opportunity Attacks. If you do so, you instead become the target of that
      Attack. and that Attack hits you regardless of your Armour
      Class.</p><p>After using this Feature, you may expend 1 Resilience to
      regain use of your Reaction.</p><p><strong>Not automated.</strong></p>
