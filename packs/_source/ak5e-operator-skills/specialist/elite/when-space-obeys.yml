    value: >-
      <ul><li><p><strong>Name</strong>: When Space
      Obeys.</p></li><li><p><strong>SP Cost:</strong>
      65.</p></li><li><p><strong>Start SP:</strong>
      30.</p></li><li><p><strong>Charging:</strong>
      Automatic.</p></li><li><p><strong>Activation Cost:</strong>
      Action.</p></li><li><p><strong>Effect:</strong> You create a vacuum effect
      by slashing the very air with your Arts; Creatures of your choice within
      30 feet of you must make a Strength Saving Throw against your Martial DC.
      On a failed Save, they take 10d6 Slashing Damage and are pulled up to 20
      feet directly towards you. On a successful Save, they take half as much
      Damage, and are only pulled 10 feet towards you. After this Damage is
      dealt, you may immediately expend your Bonus Action to teleport to a
      location you can see within 60
      feet.</p></li><li><p><strong>Duration:</strong>
      Instant.</p></li></ul><p><strong>Not Automated. </strong>Use for tracking
      purpose only.</p>
