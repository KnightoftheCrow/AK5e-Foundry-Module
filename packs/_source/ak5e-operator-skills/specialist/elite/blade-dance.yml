  description:
    value: >-
      <ul><li><p><strong>Name</strong>: Blade Dance.</p></li><li><p><strong>SP
      Cost:</strong> 65.</p></li><li><p><strong>Start SP:</strong>
      20.</p></li><li><p><strong>Charging:</strong>
      Offensive.</p></li><li><p><strong>Activation Cost:</strong>
      Action.</p></li><li><p><strong>Effect:</strong> When you use this Operator
      Skill, you can move up to half your Speed in a straight line, a storm of
      steel; you may pass through the space of other Creatures during this
      movement. Every Creature you pass through must make a Dexterity Saving
      Throw against your Martial DC. On a failed Save, they take 5d6 Slashing
      Damage; on a successful Save, they take half as much Damage. If you dealt
      Damage to a Creature, you may then repeat this sequence, up to a maximum
      of twice more. A Creature can only take Damage from this Operator Skill
      once per Turn.</p></li><li><p><strong>Duration:</strong>
      instant.</p></li></ul><p><strong>Not Automated. </strong>Use for tracking
      purpose only.</p>
