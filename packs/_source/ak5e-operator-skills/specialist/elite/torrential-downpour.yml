      30.</p></li><li><p><strong>Charging:</strong>
      Automatic.</p></li><li><p><strong>Activation Cost:</strong>
      Action.</p></li><li><p><strong>Effect:</strong> When you activate this
      Operator Skill, and at the beginning of each of your Turns for the
      duration, up to 5 different Creatures of your choice within 30 feet of you
      must make a Dexterity Saving Throw against your Martial DC as your Arts
      hammer upon them like rain. On a failed Save, they take 3d6 Force Damage;
      on a successful Save, they take half as much
      Damage.</p><p><strong>Duration:</strong> 3
      Rounds.</p></li></ul><p><strong>Not Automated. </strong>Use for tracking
