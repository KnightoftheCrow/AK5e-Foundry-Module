  description:
    value: >-
      <ul><li><p><strong>Name</strong>: Exorcise Evil.</p></li><li><p><strong>SP
      Cost:</strong> 15.</p></li><li><p><strong>Start SP:</strong>
      5.</p></li><li><p><strong>Charging:</strong>
      Automatic.</p></li><li><p><strong>Activation Cost:</strong> Bonus
      Action.</p></li><li><p><strong>Effect:</strong> You may use this Operator
      Skill when you hit a Creature with a Melee Attack; you apply an Exorcism
      Mark to that Creature. At the end of the duration, the Mark detonates, and
      that Creature takes 1d4 Force Damage for each time it was hit by an Attack
      while it had that Exorcism Mark. You may cause the Mark to detonate as a
      Reaction, ending the Skill early. If the Damage from the Mark reduces a
      Creature to 0 Hit Points, you immediately gain 10 Skill
      Points.</p></li><li><p><strong>Duration:</strong> 3
      rounds.</p></li></ul><p><strong>Not Automated. </strong>Use for tracking
      purpose.</p>
