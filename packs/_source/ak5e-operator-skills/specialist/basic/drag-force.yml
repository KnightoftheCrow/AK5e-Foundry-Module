      5.</p></li><li><p><strong>Charging:</strong>
      Automatic.</p></li><li><p><strong>Activation Cost:</strong>
      Action.</p></li><li><p><strong>Effect:</strong> Choose a Creature you can
      see within 50 feet; that Creature must succeed on a Strength Saving Throw
      against your Martial DC or Spell Save DC (your choice) or suffer one of
      the following effects of your choice; the Creature is dragged up to 30
      feet directly towards you, the Creature is dragged 50 feet directly
      downwards taking falling damage as appropriate, the Creature’s Speed is
      reduced to 0 until the end of their next
      Turn.</p></li><li><p><strong>Duration:</strong>
      Instant.</p></li></ul><p><strong>Not Automated. </strong>Use for tracking
