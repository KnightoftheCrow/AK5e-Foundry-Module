    value: >-
      <ul><li><p><strong>Name</strong>: Skydrop.</p></li><li><p><strong>SP
      Cost:</strong> 30.</p></li><li><p><strong>Start SP:</strong>
      20.</p></li><li><p><strong>Charging:</strong>
      Offensive.</p></li><li><p><strong>Activation Cost:</strong>
      Reaction.</p></li><li><p><strong>Effect:</strong> You can use this
      Operator Skill at any point when you are not in contact with the ground,
      you immediately fall directly downwards until you hit the ground; you do
      not take Damage from this fall. Instead, all other Creatures within 15
      feet of where you landed must make a Dexterity Saving Throw against your
      Martial DC; on a failed Save, they take 1d10 Thunder Damage for every 10
      feet you fell. On a successful Save, they take half as much
      Damage.</p></li><li><p><strong>Duration:</strong>
      Instant.</p></li></ul><p><strong>Not Automated:</strong> Use for tracking
