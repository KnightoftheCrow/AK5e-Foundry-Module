  description:
    value: >-
      <ul><li><p><strong>Name</strong>: Venom Fang.</p></li><li><p><strong>SP
      Cost:</strong> 35.</p></li><li><p><strong>Start SP:</strong>
      20.</p></li><li><p><strong>Charging:</strong>
      Automatic.</p></li><li><p><strong>Activation Cost:</strong> Bonus
      Action.</p></li><li><p><strong>Effect:</strong> You may activate this
      Skill when you hit a Creature with a Weapon Attack; that Creature must
      make a Constitution Saving Throw against your Martial DC. On a failed
      Save, they take 3d8 Poison Damage, and suffer the Poisoned Condition. On a
      successful Save, they take half as much Damage, and are not Poisoned. A
      Poisoned Creature may reattempt the Saving Throw at the end of each of
      their Turns, ending the effect on a successful Save, or taking 2d8 Poison
      Damage on a failed Save.</p></li><li><p><strong>Duration:</strong>
      Instant.</p></li></ul><p><strong>Not Automated:</strong> Use for tracking
      purpose.</p>
