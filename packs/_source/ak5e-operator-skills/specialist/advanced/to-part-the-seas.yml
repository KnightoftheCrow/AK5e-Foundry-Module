      40.</p></li><li><p><strong>Start SP:</strong>
      15.</p></li><li><p><strong>Charging:</strong>
      Automatic.</p></li><li><p><strong>Activation Cost:</strong>
      Action.</p></li><li><p><strong>Effect:</strong> You can only use this
      Operator Skill while you are wielding a weapon with the Thrown Property.
      You launch the weapon in a water-parting line, up to 100 feet long and 5
      foot wide; all Creatures within the area must make a Dexterity Saving
      Throw against your Martial DC. On a failed Save, they take 8d6 Piercing
      Damage. On a successful Save, they take half as much
      Damage.</p><p><strong>Duration:</strong>
      instant.</p></li></ul><p><strong>Not Automated:</strong> Use for tracking
