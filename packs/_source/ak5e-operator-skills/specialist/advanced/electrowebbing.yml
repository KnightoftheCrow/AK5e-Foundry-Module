  description:
    value: >-
      <ul><li><p><strong>Name</strong>:
      Electrowebbing.</p></li><li><p><strong>SP Cost:</strong>
      40.</p></li><li><p><strong>Start SP:</strong>
      20.</p></li><li><p><strong>Charging:</strong>
      Automatic.</p></li><li><p><strong>Activation Cost:</strong>
      Action.</p></li><li><p><strong>Effect:</strong> Choose a point you can see
      within 30 feet; all Creatures within 10 feet of that point must make a
      Dexterity Saving Throw against your Martial DC or Spell Save DC (your
      choice). On a failed Save, they take 4d6 Lightning Damage and are
      Restrained. On a successful Save, a Creature takes half as much Damage and
      is not Restrained. As an Action, A Creature Restrained in this way may
      make an Athletics or Acrobatics Check (Escape DC = DC of the initial
      Saving Throw), ending the condition on a success. A Creature Restrained in
      this way takes 2d6 Lightning Damage at the end of their Turn. When this
      Skill ends, all Creatures Restrained by it are no longer
      Restrained.</p></li><li><p><strong>Duration:</strong> 4
      Rounds.</p></li></ul><p><strong>Not Automated:</strong> Use for tracking
      purpose.</p>
