  description:
    value: >-
      <table><thead><tr><td><p>SP Cost</p></td><td><p>Start
      SP</p></td><td><p>Charging</p></td><td><p>Activation</p></td><td><p>Duration</p></td></tr></thead><tbody><tr><td><p>20</p></td><td><p>10</p></td><td><p>Automatic</p></td><td><p>Action</p></td><td><p>3
      Rounds</p></td></tr></tbody></table><p><strong>Effect: </strong>You create
      a wall of fire in a 10 foot cube originating from a point you can see
      within 60 feet. When a Creature enters the area during its Turn or begins
      its Turn there, it must make a Dexterity Saving Throw against either your
      Martial DC or Spell Save DC (your choice). On a failed Save, it takes 2d6
      Fire Damage, or 4d6 if it has not lost any Hit Points. On a successful
      Save, it takes half as much Damage.</p><p><strong>Partially Automated:
      </strong>The Use Activity allows you to place the cube; use the
      appropriate Save Activity when a Creature would need to make a Save
      against this effect.</p>
