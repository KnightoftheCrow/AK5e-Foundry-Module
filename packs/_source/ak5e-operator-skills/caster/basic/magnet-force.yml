  description:
    value: >-
      <table><thead><tr><td><p>SP Cost</p></td><td><p>Start
      SP</p></td><td><p>Charging</p></td><td><p>Activation</p></td><td><p>Duration</p></td></tr></thead><tbody><tr><td><p>20</p></td><td><p>10</p></td><td><p>Offensive</p></td><td><p>Bonus
      Action</p></td><td><p>5
      Rounds</p></td></tr></tbody></table><p><strong>Effect: </strong>Levitate a
      Melee Weapon you are carrying. As part of this Bonus Action, you may move
      that weapon up to 30ft and make a Melee Spell Attack against one Creature
      within 5 feet of it; if it hits, it deals 2d6 + your Spellcasting Modifier
      in Force Damage as opposed to the weapon’s normal Damage. On subsequent
      Rounds while the Skill is Active, you may use your Bonus Action to move
      the weapon up to 20 feet and repeat the attack against a Creature within 5
      feet of it.</p><p><strong>Partially Automated: </strong>Use the Levitate
      Weapon Activity; this will create a token you can use to track the
      position of the weapon. It will then trigger an activity to Enchant a
      Weapon; choose the one you want to levitate, and it will add an Activity
      to that Weapon to make a Melee Spell Attack with it at any range, with the
      Damage changed new value.</p>
