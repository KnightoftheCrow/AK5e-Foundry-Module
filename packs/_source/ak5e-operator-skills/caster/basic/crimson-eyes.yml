      </strong>When you cast an Art using Arts Points, you may use this Operator
      Skill to lose Hit Points in intervals of 1d12. For each 1d12 you lose, one
      of the Arts Points you used to cast that Art is
      refunded.</p><p><strong>Automated: </strong>When you cast an Art you will
      be prompted to use this; simply close the popup if you do not wish to.
      There are limitations; you will be prompted for this when casting a
      Cantrip; as Cantrips do not cost Arts Points, you cannot get a refund on
      them. Additionally, you can technically choose to refund more Arts Points
      than you have spent; this is not reccomended, as you will take the
      appropriately scaled damage, and it is also cheating.</p>
