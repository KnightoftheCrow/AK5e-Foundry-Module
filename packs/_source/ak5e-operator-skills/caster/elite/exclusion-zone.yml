      <table><thead><tr><td><p>SP Cost</p></td><td><p>Start
      SP</p></td><td><p>Charging</p></td><td><p>Activation</p></td><td><p>Duration</p></td></tr></thead><tbody><tr><td><p>65</p></td><td><p>30</p></td><td><p>Automatic</p></td><td><p>Action</p></td><td><p>3
      Rounds</p></td></tr></tbody></table><p><strong>Effect: </strong>All
      Creatures within a 50ft Cone originating from you must make a Strength
      Saving Throw as a wave of gravitic energy washes over them. On a failed
      Save, they take 5d12 Force Damage, and pushed to the closest edge of the
      Cone. On a successful Save, they take half as much Damage and are not
      pushed. For the duration, when a Creature enters the area or begins its
      Turn there, it must succeed on a Strength Saving Throw or its Speed is
      reduced to 0 for the Duration. Ranged Attacks that would pass through the
      area automatically fail.</p><p><strong>Partially Automated: </strong>Only
      the Save and Damage part of this Skill is automated.</p>
