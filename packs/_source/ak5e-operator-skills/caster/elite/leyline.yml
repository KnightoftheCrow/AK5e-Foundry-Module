      Rounds</p></td></tr></tbody></table><p><strong>Effect: </strong>For the
      duration, your Movement Speed is reduced to 0 and cannot be increased.
      However, you gain a +3 Bonus to your Spell Attack Rolls, your Spell Save
      DC is increased by 3, and when you roll to determine the Damage or Hit
      Points restored of an Art, if the result is less than half of the maximum,
      it becomes equal to half of the maximum. You may end this Skill early as
      an Action during your Turn.</p><p><strong>Partially Automated:
      </strong>The rounding up to Damage to 50% is not automated.</p>
