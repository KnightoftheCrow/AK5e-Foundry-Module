    value: >-
      <table><thead><tr><td><p>SP Cost</p></td><td><p>Start
      SP</p></td><td><p>Charging</p></td><td><p>Activation</p></td><td><p>Duration</p></td></tr></thead><tbody><tr><td><p>80</p></td><td><p>30</p></td><td><p>Automatic</p></td><td><p>Action</p></td><td><p>5
      Rounds</p></td></tr></tbody></table><p><strong>Effect: </strong>As part of
      using this Skill, you may cast an Art with a Casting Time of an Action.
      After you have cast that Art, an Echo appears within 5 feet of a Creature
      affected by the original Art (your choice if there are multiple
      Creatures). The Echo is a visible but intangible orb of Originium Arts.
      When a hostile Creature enters a 20-foot-radius around the Echo, and is
      not behind Full Cover from the Echo , they must make a Strength Saving
      Throw against your Spell Save DC. On a failed Save, they take 6d6 Damage,
      with the Damage Type being one of the Damage Types present on the original
      Art (your choice), are pulled 15 feet towards the Echo, and have their
      Movement Speed reduced by half (rounding down). On a successful Save, they
      take half as much Damage, and suffer no other effects. A Creature only
      needs to make this Save once per Turn.</p><p><strong>Partially Automated:
      </strong>Use the "Summon" Activity to Create the Desolate Echo. The Save
      and Damage is on the Desolate Echo.</p>
