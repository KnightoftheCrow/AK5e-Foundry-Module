  description:
    value: >-
      <table><thead><tr><td><p>SP Cost</p></td><td><p>Start
      SP</p></td><td><p>Charging</p></td><td><p>Activation</p></td><td><p>Duration</p></td></tr></thead><tbody><tr><td><p>50</p></td><td><p>30</p></td><td><p>Automatic</p></td><td><p>Bonus
      Action</p></td><td><p>10
      Rounds</p></td></tr></tbody></table><p><strong>Effect: </strong>You place
      a Wolfmark Curse on a Creature you can see within 100 feet of you for the
      Duration. Creatures with a Wolfmark take 1d8 Psychic Damage when they take
      Damage from your Arts. Once on each of your Turns, you can consume a
      Wolfmark on a Creature you can see (no Action required) to cause them to
      have Disadvantage on Saving Throws against your Arts this Turn. When a
      Wolfmark is consumed in this way, or a Creature with a Wolfmark falls to 0
      Hit Points, you may use a Bonus Action during this Turn or your next Turn
      to place a Wolfmark Curse on two Creatures of your choice within 100 feet
      of you for the Duration.</p><p><strong>Partially Automated: </strong>The
      "Place Wolfmark Curse" Activity consumes the SP for this Skill, and places
      a Wolfmark Curse for 10 Rounds. "Consume Wolfmark Curse" does not actually
      consume the curse, but can only be used on a Creature with the Curse; it
      also provides a use for "Spread Wolfmark Curse", as does "A Creature with
      the Wolfmark Curse Died". When this Skill ends, Wolfmarks must be manually
      removed.</p>
