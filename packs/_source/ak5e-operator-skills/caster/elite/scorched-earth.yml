      <table><thead><tr><td><p>SP Cost</p></td><td><p>Start
      SP</p></td><td><p>Charging</p></td><td><p>Activation</p></td><td><p>Duration</p></td></tr></thead><tbody><tr><td><p>65</p></td><td><p>30</p></td><td><p>Automatic</p></td><td><p>Action</p></td><td><p>3
      Rounds</p></td></tr></tbody></table><p><strong>Effect: </strong>As part of
      activating this Operator Skill, you may cast an Art with a Casting Time of
      Action, does not require Concentration, and that covers an Area of Effect
      (such as a Cone, Sphere, or Cube). For this casting only, that Art is
      considered to require Concentration. At the beginning of each of your
      Turns, the effects of that Art are reapplied to the same location as if
      you had cast it again; Damage dealt by these secondary “casts” ignore
      Resistances. The Art ends when you lose Concentration, or the duration of
      this Skill ends.</p><p><strong>Partially Automated: </strong>Use the
      Recast Activity to grant your next Art the ability to ignore Damage
      Resistance; make sure you use this for the "recast" of the Art you cast
      with this Skill!</p>
