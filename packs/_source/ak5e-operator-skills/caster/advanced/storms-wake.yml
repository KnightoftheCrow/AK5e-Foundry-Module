  description:
    value: >-
      <table><thead><tr><td><p>SP Cost</p></td><td><p>Start
      SP</p></td><td><p>Charging</p></td><td><p>Activation</p></td><td><p>Duration</p></td></tr></thead><tbody><tr><td><p>40</p></td><td><p>20</p></td><td><p>Automatic</p></td><td><p>Action</p></td><td><p>3
      Rounds</p></td></tr></tbody></table><p><strong>Effect: </strong>As part of
      using this Skill, you may cast an non-Cantrip Art with a Casting Time of
      Action, does not require Concentration, and that covers an Area of Effect
      (such as a Cone, Sphere, or Cube). After that Art has been resolved, an
      Arts Storm appears at a point of your choice within the original Arts Area
      of Effect. The Arts Storm is a 15-foot-radius Sphere. A Creature that
      enters the Sphere during their Turn, or begins their Turn there, must make
      a Dexterity Saving Throw against your Spell Save DC. On a failed Save,
      they take 6d6 Damage, with the Damage Type being one of the Damage Types
      present on the original Art (your choice). On a successful Save, they take
      half as much. At the end of your Turn for the duration, the Storm moves 20
      feet directly away from you.</p><p><strong>Partially Automated:
      </strong>The "Create Storm" Activity creates a template for the duration
      to track the storm. The "Save" Activity should be used for Creatures that
      need to make a Save against the storm; remember to choose the correct
      Damage Type.</p>
