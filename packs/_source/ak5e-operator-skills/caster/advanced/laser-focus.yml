      </strong>As part of using this Skill, you may cast an Art with a Casting
      Time of Action, and that covers an Area of Effect (such as a Cone, Sphere,
      or Cube). The range and affected area of that Art is replaced with a Line
      originating from you, 120 feet in length and 5 foot in width, for that
      casting only. Creatures that have to make a Saving Throw against that Art
      this Turn have Disadvantage on that Saving Throw.</p><p><strong>Not
      possible to automate: </strong>The activity places a line for targeting
      purposes only.</p>
