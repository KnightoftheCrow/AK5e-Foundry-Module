  description:
    value: >-
      <table><thead><tr><td><p>SP Cost</p></td><td><p>Start
      SP</p></td><td><p>Charging</p></td><td><p>Activation</p></td><td><p>Duration</p></td></tr></thead><tbody><tr><td><p>40</p></td><td><p>10</p></td><td><p>Offensive</p></td><td><p>Bonus
      Action</p></td><td><p>5
      Rounds</p></td></tr></tbody></table><p><strong>Effect: </strong>You create
      an Arts Redirection Portal at a location you can see within 30 feet. The
      Portal is intangible, ethereal, and cannot be damaged. Once on each of
      your Turns, you may cause your Portal to move up to 30 feet in a direction
      you choose. Once per Turn, when you cast a Cantrip, you may cast that
      Cantrip an additional time from your Portal (no Action required); you cast
      the Cantrip as if you were in the Portal’s space. Additionally, when you
      cast any levelled Art, you may cast it as if you were in the Portal’s
      Space.</p><p><strong>Partially Automated: </strong>The "Summon Portal"
      Activity summons a portal just to track the location of the portal; to
      cast an Art from its location you will have to move yourself there and
      move back afterwards. Similarly, the "Move Portal" Activity is purely to
      track using your bonus action, and does nothing.</p>
