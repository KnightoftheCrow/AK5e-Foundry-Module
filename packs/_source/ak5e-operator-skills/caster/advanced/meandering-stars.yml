    value: >-
      <table><thead><tr><td><p>SP Cost</p></td><td><p>Start
      SP</p></td><td><p>Charging</p></td><td><p>Activation</p></td><td><p>Duration</p></td></tr></thead><tbody><tr><td><p>40</p></td><td><p>30</p></td><td><p>Automatic</p></td><td><p>Action</p></td><td><p>Instant</p></td></tr></tbody></table><p><strong>Effect:
      </strong>A shower of Arts burst from you, raining like falling stars. Roll
      1d6 for each Creature of your choice within 50 feet of you. On a result of
      5 or 6, that Creature takes 4d8 Force Damage.</p><p><strong>Partially
      Automated: </strong>When you use this Feature, use the Scaling Bar to
      match the number of Creatures you targeted, and it will roll the right
      amount of d6. Then use the "Damage" Activity to apply Damage as
      appropriate; it is reccomended to go either clockwise or counter-clockwise
      when applying the d6 to the Creatures at large numbers. </p>
