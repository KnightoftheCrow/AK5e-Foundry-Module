  description:
    value: >-
      <table><thead><tr><td><p>SP Cost</p></td><td><p>Start
      SP</p></td><td><p>Charging</p></td><td><p>Activation</p></td><td><p>Duration</p></td></tr></thead><tbody><tr><td><p>30</p></td><td><p>15</p></td><td><p>Automatic</p></td><td><p>Action</p></td><td><p>3
      Rounds</p></td></tr></tbody></table><p><strong>Effect: </strong>Choose a
      friendly Creature you can see within 30-feet. For the duration, both you
      and that Creature projects destructive Arts in a 15-foot-radius around
      themselves. When a hostile Creature enters the area or begins their Turn
      there, they must make a Constitution Saving Throw against your Spell Save
      DC, taking 3d8 Force Damage on a failed Save, or half as much on a
      successful one. A Creature can only take this Damage once per
      Turn.</p><p><strong>Partially Automated: </strong>When you activate this
      Operator Skill, make sure to target both yourself AND the ally you intend
      to target. The "Save" Activity should be used by you whenever a Creature
      would need to make a Save against this Skill, targeting that Creature.</p>
