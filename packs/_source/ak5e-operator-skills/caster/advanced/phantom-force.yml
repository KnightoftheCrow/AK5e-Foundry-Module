  advancement: []
  description:
    value: >-
      <table><thead><tr><td><p>SP Cost</p></td><td><p>Start
      SP</p></td><td><p>Charging</p></td><td><p>Activation</p></td><td><p>Duration</p></td></tr></thead><tbody><tr><td><p>40</p></td><td><p>10</p></td><td><p>Automatic</p></td><td><p>Action</p></td><td><p>Instant</p></td></tr></tbody></table><p><strong>Effect:
      </strong>Choose a location you can see within 100 feet. All Creatures
      within a 20-foot Sphere centered on that point must make an Intelligence
      Saving Throw against your Spell Save DC. On a failed Save, they are
      trapped in your Nightmare until the end of their next Turn; a Creature in
      the Nightmare takes 2 Psychic Damage for each foot it moves, is Frightened
      of all other Creatures, and has Disadvantage on all Attacks it makes. A
      Creature in the Nightmare is not blinded, but the world appears as a
      horrific facsimile of the real world. On a successful Save, they are Dazed
      until the end of their next Turn. A Creature that is immune to the
      Frightened Condition is immune to this effect.</p><p><strong>Partially
      Automated: </strong>Use the "Activate Skill" Activity first, and the
      "Reactivate Skill" Activity on subsequent Turns. The duration of the
      Binding effect is a flat 3 rounds, and must be manually removed if the
      skill expires before then.</p>
