  description:
    value: >-
      <table><thead><tr><td><p>SP Cost</p></td><td><p>Start
      SP</p></td><td><p>Charging</p></td><td><p>Activation</p></td><td><p>Duration</p></td></tr></thead><tbody><tr><td><p>30</p></td><td><p>15</p></td><td><p>Automatic</p></td><td><p>Action</p></td><td><p>3
      Rounds</p></td></tr></tbody></table><p><strong>Effect: </strong>When you
      Activate this Skill, and as a Bonus Action on subsequent Turns, you can
      choose a Creature that can see you within 60 feet; that Creature must
      succeed on a Charisma Saving Throw against your Spell Save DC or become
      Restrained for the duration of the Skill, bound up in your Arts. The
      Creature may reattempt the Saving Throw at the end of each of their Turns,
      ending the Condition on a success. Once a Creature has succeeded on this
      Saving Throw, it becomes immune to this effect for 1
      hour.</p><p><strong>Partially Automated: </strong>Use the "Activate Skill"
      Activity first, and the "Reactivate Skill" Activity on subsequent Turns.
      The duration of the Binding effect is a flat 3 rounds, and must be
      manually removed if the skill expires before then.</p>
