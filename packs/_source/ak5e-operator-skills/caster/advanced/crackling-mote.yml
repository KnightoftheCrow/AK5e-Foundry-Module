  description:
    value: >-
      <table><thead><tr><td><p>SP Cost</p></td><td><p>Start
      SP</p></td><td><p>Charging</p></td><td><p>Activation</p></td><td><p>Duration</p></td></tr></thead><tbody><tr><td><p>35</p></td><td><p>20</p></td><td><p>Automatic</p></td><td><p>Action</p></td><td><p>Instant</p></td></tr></tbody></table><p><strong>Effect:
      </strong>You create a mote of Arts in an unoccupied space you can see
      within 30 feet for 10 minutes. A hostile Creature that moves within 10
      feet of the mote or begins its Turn there makes a Dexterity Saving Throw
      against your Spell Save DC. On a failed Save, they take 20 Force Damage,
      or 10 on a successful Save. The mote disappears after it has dealt 60
      Damage, after 10 minutes, or when you use this Skill
      again.</p><p><strong>Partially Automated: </strong>Summons a Mote which
      you must manually trigger the "Attack" for.</p>
