  description:
    value: >-
      <table><thead><tr><td><p>SP Cost</p></td><td><p>Start
      SP</p></td><td><p>Charging</p></td><td><p>Activation</p></td><td><p>Duration</p></td></tr></thead><tbody><tr><td><p>40</p></td><td><p>20</p></td><td><p>Automatic</p></td><td><p>Action</p></td><td><p>Instant</p></td></tr></tbody></table><p><strong>Effect:
      </strong>You release a burst of electrical Arts energy that fries
      circuits; Creatures of your choice within a 50-foot-radius Sphere centered
      on you must make a Dexterity Saving Throw against your Martial DC or Spell
      Save DC (your choice). On a failed Save, they take 3d6 Lightning Damage;
      on a successful Save, they take half as much Damage. If the Creature is a
      Construct (Machine) or otherwise has significant electrical components, on
      a failed Save they instead take 9d6 Lightning Damage and are Paralyzed
      until the end of their next Turn. On a successful Save, they take half as
      much Damage, and are Dazed until the end of their next
      Turn.</p><p><strong>Partially Automated: </strong>Use the "Save" Activity
      First and exclude any Creature that would be eligible for the additional
      Damage. Afterwards, use the "Save for Machines" Activity and exclude any
      Creature that is *not* eligible for the additional Damage.</p>
