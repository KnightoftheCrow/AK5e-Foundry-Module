  description:
    value: >-
      <ul><li><p><strong>Name</strong>: Earthen Might.</p></li><li><p><strong>SP
      Cost:</strong> 30.</p></li><li><p><strong>Start SP:</strong>
      20.</p></li><li><p><strong>Charging:</strong>
      Automatic.</p></li><li><p><strong>Activation Cost:</strong> Bonus
      Action.</p></li><li><p><strong>Effect:</strong> When you activate this
      Skill, and at the beginning of each of your Turns while this Operator
      Skill is Active, you gain 1 Earthen Might. Each Earthen Might you have
      grants you 2 Damage Resistance against all Damage. As a Bonus Action
      during your Turn, you may consume all of your Earthen Might to add +2
      Damage to Damage Rolls you make for Melee Attacks for each Earthen Might
      consumed until the end of that Turn. At the end of a Turn you have done
      so, the Skill ends. When the Skill Ends, you lose all Earthen
      Might.</p></li><li><p><strong>Duration:</strong> 5
      rounds.</p></li></ul><p><strong>Not Automated: </strong>Use for tracking
      purpose.</p>
