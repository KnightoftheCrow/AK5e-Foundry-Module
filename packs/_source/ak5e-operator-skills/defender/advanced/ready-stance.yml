      20.</p></li><li><p><strong>Charging:</strong>
      Automatic.</p></li><li><p><strong>Activation Cost:</strong> Bonus
      Action.</p></li><li><p><strong>Effect:</strong> Assume a stance ready for
      countering. While in this stance, when a Creature you can see hits you
      with an Attack, you can use your Reaction to halve the Damage of that
      Attack, and make a Melee Attack against them if they are within your
      Reach. If that Attack hits, you regain use of your
      Reaction.</p></li><li><p><strong>Duration:</strong> 3
      Rounds.</p></li></ul><p><strong>Not Automated: </strong>Use for tracking
