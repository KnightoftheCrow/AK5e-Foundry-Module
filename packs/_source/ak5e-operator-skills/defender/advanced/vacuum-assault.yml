  description:
    value: >-
      <ul><li><p><strong>Name</strong>: Vacuum
      Assault.</p></li><li><p><strong>SP Cost:</strong>
      40.</p></li><li><p><strong>Start SP:</strong>
      15.</p></li><li><p><strong>Charging:</strong>
      Automatic.</p></li><li><p><strong>Activation Cost:</strong> Bonus
      Action.</p></li><li><p><strong>Effect:</strong> Once per Turn when you
      make an Attack Roll, you can force all hostile Creatures within 30 feet of
      you to make a Strength Saving Throw against your Martial DC. On a failed
      Save, they are pulled 20 feet towards you; on a successful Save, they are
      only pulled 10 feet towards you. If a Creature would enter your space as a
      result of this movement, they are placed as close to you as possible, and
      take 2d8 Bludgeoning Damage.</p></li><li><p><strong>Duration:</strong>
      Instant.</p></li></ul><p><strong>Not Automated: </strong>Use for tracking
      purpose.</p>
