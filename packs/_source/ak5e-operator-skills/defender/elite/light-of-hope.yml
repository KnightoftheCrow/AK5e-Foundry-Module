  description:
    value: >-
      <ul><li><p><strong>Name</strong>: Light of Hope.</p></li><li><p><strong>SP
      Cost:</strong> 65.</p></li><li><p><strong>Start SP:</strong>
      30.</p></li><li><p><strong>Charging:</strong>
      Automatic.</p></li><li><p><strong>Activation Cost:
      </strong>Action.</p></li><li><p><strong>Effect:</strong> You summon a
      Light of Hope in a location you can see. The Light is intangible, cannot
      be damaged or moved, and projects bright light in a 30-foot radius around
      it. For the duration of the Skill, Friendly Creatures within 15-foot of
      the Light have Advantage on Wisdom and Charisma Saving Throws, and gain
      Temporary Hit Points at the beginning of each of their Turns equal to your
      Character Level. Once per Turn, when you hit a Creature with an Attack
      while you are within 15-feet of a Light of Hope, that Creature loses 1d8
      Hit Points.</p></li><li><p><strong>Duration:</strong> 5
      Rounds.</p></li></ul><p><strong>Not Automated.</strong></p>
