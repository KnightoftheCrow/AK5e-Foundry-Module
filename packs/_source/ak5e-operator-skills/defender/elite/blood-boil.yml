  description:
    value: >-
      <ul><li><p><strong>Name</strong>: Blood Boil.</p></li><li><p><strong>SP
      Cost:</strong> 50.</p></li><li><p><strong>Start SP:</strong>
      30.</p></li><li><p><strong>Charging:</strong>
      Automatic.</p></li><li><p><strong>Activation Cost: </strong>Bonus
      Action.</p></li><li><p><strong>Effect:</strong> For the duration, your
      Attacks deal 1d12 additional Weapon Damage, but you take 1d12 Fire Damage
      at the end of each Turn that cannot be reduced by Resistances or Damage
      Reduction. While this Skill is Active, keep track of the amount of Damage
      you take; when this Skill ends, all other Creatures within a
      15-foot-radius Sphere centred on you must make a Dexterity Saving Throw
      against your Martial DC. On a failed Save, they take Fire Damage equal to
      twice the Damage you took while this Skill was Active; on a successful
      Save, they take half as much. You can end this Operator Skill early as a
      Bonus Action.</p></li><li><p><strong>Duration:</strong> 3
      Rounds.</p></li></ul><p><strong>Not Automated.</strong></p>
