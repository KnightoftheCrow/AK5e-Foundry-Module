    value: >-
      <ul><li><p><strong>Name</strong>: Trial of
      Thorns.</p></li><li><p><strong>SP Cost:</strong>
      65.</p></li><li><p><strong>Start SP:</strong>
      30.</p></li><li><p><strong>Charging:</strong>
      Defensive.</p></li><li><p><strong>Activation Cost:
      </strong>Action.</p></li><li><p><strong>Effect:</strong> When a hostile
      Creature within 30 feet of you would make an Attack against a Creature
      that is not you, you can use your Reaction to force the attacking Creature
      to make a Wisdom Saving Throw against your Martial DC; on a failed Save,
      they must Attack you instead if they are able, and cannot Attack
      otherwise. Once during each Creature’s Turn, when a Creature makes an
      Attack against you, you can move half of your Speed towards that Creature
      and make a Melee Attack against them if possible (no Action
      required).</p></li><li><p><strong>Duration:</strong> 3
      Rounds.</p></li></ul><p><strong>Not Automated.</strong></p>
