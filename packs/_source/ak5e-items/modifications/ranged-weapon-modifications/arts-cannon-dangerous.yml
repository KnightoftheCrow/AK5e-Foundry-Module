  description:
    value: >-
      <p><strong>Item:</strong> Ranged Weapon with the Two-Handed
      Property</p><p>This weapon has been fitted with an experimental grenade
      launcher/casting unit hybrid allowing it to pelt an unstable burst of
      Originium Arts in a chosen direction. The wielder may activate this
      Modification as an Action; choose a point they can see within 60 feet. All
      Creatures within a 10-foot radius sphere centred on that point must make a
      Dexterity Saving Throw against your Inventor DC; on a failed Save, they
      take 3d8 Force Damage. On a successful Save, they take half as much
      Damage.</p><p>At 7th Level, the Damage of this Modification is increased
      to 4d8. At 14th Level, it is increased to 5d8.</p>
