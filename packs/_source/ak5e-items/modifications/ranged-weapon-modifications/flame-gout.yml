    value: >-
      <p><strong>Item:</strong> Ranged Weapon with the Two-Handed
      Property</p><p>This weapon is fitted with a flame-projector. The wielder
      may activate this Modification as an Action to project a 15-foot cone of
      fire in a direction of their choice. All Creatures within that area must
      make a Dexterity Saving Throw against your Inventor DC; on a failed Save,
      they take 1d8 Fire Damage and suffer the Burning Condition. On a
      successful Save, they take half as much Damage, and suffer no other
      effects.</p><p>At 7th Level, the Damage of this Modification is increased
      to 2d8. At 14th Level, it is increased to 3d8.</p>
