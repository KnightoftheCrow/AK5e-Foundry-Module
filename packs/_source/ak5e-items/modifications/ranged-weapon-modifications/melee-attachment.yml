    value: >-
      <p><strong>Item:</strong> Ranged Weapon</p><p>This weapon has an
      attachment designed for melee. The wielder may activate this Modification
      as a Bonus Action during their Turn, or as part of an Attack of
      Opportunity. After activation, they may make Melee Attacks using that
      Weapon until the end of that Turn. They may use their Dexterity Modifier
      instead of Strength for the Attack and Damage Rolls of this Weapon, and
      those Melee Attacks deal 1d8 + their Attack Modifier in Piercing
      Damage.</p>
