      <p><strong>Item:</strong> Any Armour</p><p>This armour is fitted with a
      mechanical exoskeleton, reinforcing the wearer’s strength when necessary.
      The wearer may activate this Modification as a Bonus Action; until the
      beginning of their next Turn, they are treated as being one size larger
      for determining what they can push, pull, or carry, their jump height and
      length is doubled, they have Advantage on any Strength (Athletics) Check,
      and they are not slowed by carrying another Creature of the same size or
      smaller.</p>
