  description:
    value: >-
      <p><strong>Item:</strong> Melee Weapon</p><p>This weapon possesses a
      specialised Casting Unit that converts Arts from the wielder into a
      slicing blade of light. When the wielder takes the Attack Action, they may
      forgo one Attack to activate this Modification. If they do, all Creatures
      in a 15-foot Cone originating from the wielder must make a Dexterity
      Saving Throw against your Inventor DC. On a failed Save, they take 3d8
      Radiant Damage. On a successful Save, they take half as much
      Damage.</p><p>At 7th Level, the Damage of this Modification is increased
      to 4d8. At 14th Level, it is increased to 5d8.</p>
