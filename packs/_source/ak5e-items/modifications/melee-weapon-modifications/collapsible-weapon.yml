  description:
    value: >-
      <p><strong>Item:</strong> Melee Weapon</p><p>This weapon has been modified
      so as to be able to compress down into a state easy for concealment. The
      wielder may activate this Modification as an Action; the weapon folds down
      into a form roughly half of its previous size. Additionally, it folds into
      an appropriate disguise for its new size; a polearm may become a cane, for
      example. If the weapon is used to Attack in this form, it is treated as
      being an improvised melee weapon; the wielder may return the weapon to its
      previous form as a Bonus Action.</p>
