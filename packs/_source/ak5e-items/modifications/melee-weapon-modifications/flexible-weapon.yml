  description:
    value: >-
      <p><strong>Item:</strong> Melee Weapon</p><p>Some part of this weapon has
      been made possible to bend and extend like a whip. Once per Turn when the
      wielder makes a Melee Attack using this Weapon, they may activate this
      Modification (no Action required); That Attack ignores the benefit of any
      shield wielded by the target Creature. In addition, the wielder may then
      immediately use their Bonus Action to repeat that Attack against a
      different Creature within 10 feet of the original target, keeping the
      benefit of this Modification being active.</p>
