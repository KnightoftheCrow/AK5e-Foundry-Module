  description:
    value: >-
      <p><strong>Set Up:</strong> You set an Gas Trap in a 5-foot square on the
      ground. When a Creature enters the area, the Trap is
      triggered.</p><p><strong>On Trigger:</strong> A rush of toxic gas fills
      the air in a 15-foot-radius sphere centred on the Trap for 1 minute; if a
      Creature is in the sphere when it appears, or enters it for the first time
      during a Turn, they must make a Constitution Saving Throw against your
      Trap DC. On a failed Save, they take 2d8 Poison Damage and are Poisoned.
      On a successful Save, they take half as much Damage and are not
      Poisoned.</p><p>The Damage of this Trap is increased to 3d8 at 7th Level,
      and 4d8 at 14th Level.</p>
