  description:
    value: >-
      <p><strong>Set Up:</strong> You set an Explosive Trap in a 5-foot square
      on the ground. When a Creature enters the area, the Trap is
      triggered.</p><p><strong>On Trigger:</strong> The trap explodes violently.
      All Creatures within a 15-foot-radius Sphere centered on the Trap must
      make a Dexterity Saving Throw against your Trap DC. On a failed Save, they
      take 4d8 Thunder Damage. On a successful Save, they take half as much
      Damage.</p><p>The Damage of this Trap is increased to 6d8 at 7th Level,
      and 8d8 at 14th Level.</p>
