  description:
    value: >-
      <p><strong>Set Up:</strong> You set a Snare Trap in a line up to 10 foot
      long and 1 foot wide. When a Creature enters the area, they trigger the
      Trap.</p><p><strong>On Trigger:</strong> A coiling rope or similar object
      attempts to tie the Creature up. The triggering Creature must succeed on a
      Dexterity Saving Throw against your Trap DC or become Restrained by it. As
      an Action during their Turn, they can make a Athletics or Acrobatics Check
      against your Trap DC to end the Condition. Alternatively, a different
      Creature within 5 feet of them can free them by cutting them free with a
      bladed weapon, or succeeding on a Sleight of Hand Check against your Trap
      DC as an Action.</p>
