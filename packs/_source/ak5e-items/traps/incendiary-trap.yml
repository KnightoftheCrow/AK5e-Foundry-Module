  description:
    value: >-
      <p><strong>Set Up:</strong> You set an Gas Trap in a 5-foot square on the
      ground. When a Creature enters the area, the Trap is
      triggered.</p><p><strong>On Trigger:</strong> A plume of fire and
      flammable liquid erupts in a 15-foot-radius sphere centred on the Trap;
      all Creatures within this area must make a Dexterity Saving Throw against
      your Trap DC. On a failed Save, they take 2d8 Fire Damage and begin
      Burning. On a successful Save, they take half as much Damage, and do not
      suffer the Burning Condition.</p><p>The Damage of this Trap is increased
      to 3d8 at 7th Level, and 4d8 at 14th Level.</p>
