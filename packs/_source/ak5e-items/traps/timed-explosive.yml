  description:
    value: >-
      <p><strong>Set Up:</strong> You plant a bomb. When you do so, you nominate
      a length of time until the bomb explodes; no greater than one hour, and no
      less than 10 seconds (or two Rounds).</p><p><strong>On Trigger:</strong>
      When the time has elapsed, the bomb explodes, dealing 6d10 Thunder Damage
      to everything within a 20-foot-radius sphere centred on the bomb; this
      explosion goes around corners. Vehicles and Structures take double Damage
      from this explosion.</p>
