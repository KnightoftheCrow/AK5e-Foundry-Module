    value: >-
      <p><strong>Set Up:</strong> You set a Spike Trap in a line up to 10 foot
      long and 1 foot wide. When a Creature enters the area, they trigger the
      Trap. This Trap can be triggered multiple times.</p><p><strong>On
      Trigger:</strong> The triggering Creature must succeed on a Dexterity
      Saving Throw against your Spell Save DC or take 1d8 Piercing Damage, and
      begin Bleeding.</p><p>From 7th Level, Creatures who fail this Saving Throw
      also have their Speed reduced by 10 feet until they are no longer missing
      any Hit Points.</p>
