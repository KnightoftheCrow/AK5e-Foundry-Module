  description:
    value: >-
      <p><strong>Set Up:</strong> You set a Paddle Trap in a line up to 10 foot
      long and 1 foot wide. When a Creature enters the area, they trigger the
      Trap.</p><p><strong>On Trigger:</strong> A blunt object is launched at the
      triggering Creature. That Creature must make a Dexterity Saving Throw
      against your Trap DC. On a failed Save, they take 4d8 Bludgeoning Damage
      and are Dazed for 1 minute. On a successful Save, they take half as much
      Damage, and are not Dazed. If this damage reduces them to 0 Hit Points,
      they are knocked Unconscious instead of killed.</p><p>The Damage of this
      Trap is increased to 6d8 at 7th Level, and 8d8 at 14th Level.</p>
