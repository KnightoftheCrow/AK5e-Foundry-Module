  description:
    value: >-
      <p>As an Action, you can apply this to a Weapon you are carrying, or
      poison food/drink within 5ft of you. Each Weapon or other object can only
      contain one Toxin at a time; applying a new Toxin overwrites the effect of
      the old toxin.</p><p>When applied to a Weapon, the effect lasts for ten
      minutes.The first time each Turn you hit a Creature with that Weapon, that
      Creature must pass a DC15 Constitution Saving Throw or be driven Berserk
      until the end of their next Turn. While Berserk, they regard all other
      Creatures as actively hostile, and must attack the Creature closest to
      themselves.</p><p>If a Creature consumes food/drink that has been poisoned
      using this, they must make a DC15 Constitution Saving Throw. On a failed
      save, they are driven Berserk for 1 hour, and regard all other Creatures
      as actively hostile. On a successful Save, they are instead driven Berserk
      for 1 minute.</p>
