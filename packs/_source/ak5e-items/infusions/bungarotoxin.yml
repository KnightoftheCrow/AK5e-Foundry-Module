  description:
    value: >-
      <p>As an Action, you can apply this to a Weapon you are carrying, or
      poison food/drink within 5ft of you. Each Weapon or other object can only
      contain one Toxin at a time; applying a new Toxin overwrites the effect of
      the old toxin.</p><p>When applied to a Weapon, the effect lasts for ten
      minutes or until after you have hit a Creature with the affected weapon.
      When you hit a Creature with that Weapon, that Creature must make a DC15
      Constitution Saving Throw. On a failed Save, they take 2d10 Poison Damage
      and are Paralyzed. On a succesful Save, they take 2d10 Poison Damage and
      are not Paralyzed. A Creature Paralyzed in this way can reattempt this
      Saving Throw at the end of each of their Turns, ending the effect on a
      success.</p><p>If a Creature consumes food/drink that has been poisoned
      using this, they must make a DC15 Constitution Saving Throw. On a failed
      Save, they are Paralyzed and Unconscious for 24 hours. On a successful
      Save, they are instead Paralyzed for 1 hour.</p>
